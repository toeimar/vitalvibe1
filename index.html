const resizeImage = (file, maxSize=600) => new Promise(resolve => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let {width, height} = img;
      if (width > height) { if (width > maxSize) { height *= maxSize/width; width = maxSize; } }
      else { if (height > maxSize) { width *= maxSize/height; height = maxSize; } }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

const analyzeFoodWithAI = async (base64Image) => {
  const prompt = `คุณคือนักโภชนาการ AI วิเคราะห์ภาพอาหารนี้และตอบกลับเป็น JSON format เท่านั้น ห้ามมี markdown:
{"name":"ชื่อเมนูอาหาร","calories":300,"sugar":"ต่ำ/ปานกลาง/สูง","sodium":"ต่ำ/ปานกลาง/สูง","fat":"ต่ำ/ปานกลาง/สูง","advice":"คำแนะนำสั้นๆ"}`;
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      contents:[{role:"user",parts:[{text:prompt},{inlineData:{mimeType:"image/jpeg",data:base64Image.split(',')[1]}}]}],
      generationConfig:{responseMimeType:"application/json"}
    })
  });
  const data = await res.json();
  return JSON.parse(data.candidates[0].content.parts[0].text);
};

function setupRealtimeListeners() {
  const missionsRef = collection(db,'artifacts',APP_ID,'public','data','missions');
  unsubscribers.push(onSnapshot(missionsRef, snap => {
    const loaded = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (loaded.length === 0) {
      [{title:'ลาขาดหวาน 1 วัน',subtitle:'งดเครื่องดื่มและขนมหวาน',points:20,category:'เบาหวาน',maxPerDay:1,expiresAt:''},

      ].forEach(m => addDoc(missionsRef, m));
    } else { STATE.missions = loaded; render(); }
  }));

  const rewardsRef = collection(db,'artifacts',APP_ID,'public','data','rewards');
  unsubscribers.push(onSnapshot(rewardsRef, snap => {
    const loaded = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (loaded.length === 0) {
      [{title:'คูปองตรวจสุขภาพ',points:5000,image:'🎟️',type:'physical'},
       {title:'ชุดของขวัญสุขภาพ',points:3500,image:'🧺',type:'physical'},
       {title:'แก้วน้ำเก็บอุณหภูมิ',points:1500,image:'🥤',type:'physical'},
       {title:'กรอบโปรไฟล์พิเศษ',points:500,image:'🖼️',type:'virtual'},
       {title:'ตราสัญลักษณ์ VIP',points:1000,image:'👑',type:'virtual'}
      ].forEach(r => addDoc(rewardsRef, r));
    } else { STATE.rewards = loaded; render(); }
  }));

  const profilesRef = collection(db,'artifacts',APP_ID,'public','data','profiles');
  unsubscribers.push(onSnapshot(profilesRef, snap => {
    STATE.profiles = snap.docs.map(d=>d.data());
    STATE.leaderboard = STATE.profiles.filter(u=>u.role==='user').sort((a,b)=>b.points-a.points).map((u,i)=>({...u,rank:i+1}));
    if (STATE.user) {
      const updated = STATE.profiles.find(u=>u.uid===STATE.user.uid);
      if (updated) STATE.user = updated;
    }
    render();
  }));
}

function setupUserListeners(uid) {
  const today = getTodayStr();
  const statsRef = doc(db,'artifacts',APP_ID,'public','data',`stats_${uid}`,today);
  unsubscribers.push(onSnapshot(statsRef, snap => {
    if (snap.exists()) STATE.stats = snap.data();
    else { STATE.stats = {water:0,steps:0}; setDoc(statsRef,{water:0,steps:0}); }
    render();
  }));

  const progressRef = collection(db,'artifacts',APP_ID,'public','data',`progress_${uid}`);
  unsubscribers.push(onSnapshot(progressRef, snap => {
    STATE.userProgress = snap.docs.map(d=>d.data());
    render();
  }));

  const logsRef = collection(db,'artifacts',APP_ID,'public','data',`logs_${uid}`);
  unsubscribers.push(onSnapshot(logsRef, snap => {
    STATE.logs = snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.date===today).sort((a,b)=>b.timestamp-a.timestamp);
    render();
  }));
}

// ========== AUTH ==========
async function handleLogin(email, password) {
  const eid = cleanEmail(email);
  const authRef = doc(db,'artifacts',APP_ID,'public','data','auth',eid);
  const snap = await getDoc(authRef);
  if (!snap.exists()) { showToast('ไม่พบบัญชีนี้ กรุณาสมัครสมาชิก','error'); return; }
  const authData = snap.data();
  if (authData.password !== password) { showToast('รหัสผ่านไม่ถูกต้อง','error'); return; }
  const pSnap = await getDoc(doc(db,'artifacts',APP_ID,'public','data','profiles',authData.uid));
  if (pSnap.exists()) {
    STATE.user = pSnap.data();
    try { localStorage.setItem('vv_uid_v10', STATE.user.uid); } catch(e){}
    if (STATE.user.role === 'user') setupUserListeners(STATE.user.uid);
    showToast('เข้าสู่ระบบสำเร็จ! 🚀');
    render();
  }
}

async function handleRegister(email, password, name, isAdmin, adminPin) {
  if (isAdmin && adminPin !== ADMIN_PIN) { showToast('รหัสลับแอดมินไม่ถูกต้อง!','error'); return; }
  const eid = cleanEmail(email);
  const authRef = doc(db,'artifacts',APP_ID,'public','data','auth',eid);
  const snap = await getDoc(authRef);
  if (snap.exists()) { showToast('อีเมลนี้ถูกใช้งานแล้ว','error'); return; }
  const uid = 'USR_' + Date.now() + Math.random().toString(36).substring(2,8);
  const role = isAdmin ? 'admin' : 'user';
  const avatar = 'https://api.dicebear.com/7.x/notionists/svg?seed=' + encodeURIComponent(name);
  await setDoc(authRef, {email:eid, password, uid, role});
  const profile = {uid, name, role, points:0, level:1, avatar};
  await setDoc(doc(db,'artifacts',APP_ID,'public','data','profiles',uid), profile);
  STATE.user = profile;
  try { localStorage.setItem('vv_uid_v10', uid); } catch(e){}
  if (role === 'user') setupUserListeners(uid);
  showToast('สร้างบัญชีสำเร็จ! 🎉');
  render();
}

function handleLogout() {
  showConfirm('คุณต้องการออกจากระบบหรือไม่?', () => {
    STATE.user = null;
    try { localStorage.removeItem('vv_uid_v10'); } catch(e){}
    showToast('ออกจากระบบแล้ว');
    render();
  });
}

// ========== TOAST & DIALOGS ==========
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.innerHTML = `<div class="toast ${type==='error'?'toast-error':''}">${type==='error'?'⚠️':'✅'} ${msg}</div>`;
  t.style.display='flex';
  setTimeout(()=>{ t.style.display='none'; }, 3000);
}

function showConfirm(text, onConfirm) {
  const el = document.getElementById('confirm-dialog');
  document.getElementById('confirm-text').textContent = text;
  el.style.display = 'flex';
  document.getElementById('confirm-ok').onclick = () => { el.style.display='none'; onConfirm(); };
  document.getElementById('confirm-cancel').onclick = () => { el.style.display='none'; };
}

function showPrompt(title, desc, defaultVal, onConfirm) {
  const el = document.getElementById('prompt-dialog');
  document.getElementById('prompt-title').textContent = title;
  document.getElementById('prompt-desc').textContent = desc;
  document.getElementById('prompt-input').value = defaultVal;
  el.style.display = 'flex';
  document.getElementById('prompt-ok').onclick = () => { el.style.display='none'; onConfirm(document.getElementById('prompt-input').value); };
  document.getElementById('prompt-cancel').onclick = () => { el.style.display='none'; };
}

// ========== RENDER ==========
function render() {
  const root = document.getElementById('root');

  if (!STATE.user) { root.innerHTML = renderAuth(); bindAuthEvents(); return; }
  if (STATE.user.role === 'admin') { root.innerHTML = renderAdmin(); bindAdminEvents(); return; }
  root.innerHTML = renderUser(); bindUserEvents();
}

let authMode = 'login';
function bindAuthEvents() {
  document.getElementById('auth-submit-btn').onclick = async () => {
    const email = document.getElementById('input-email').value;
    const password = document.getElementById('input-password').value;
    if (!email || !password) { showToast('กรุณากรอกอีเมลและรหัสผ่าน','error'); return; }
    if (authMode === 'login') {
      await handleLogin(email, password);
    } else {
      const name = document.getElementById('input-name').value;
      if (!name) { showToast('กรุณากรอกชื่อ','error'); return; }
      const isAdmin = document.getElementById('admin-check').checked;
      const adminPin = isAdmin ? document.getElementById('input-admin-pin').value : '';
      await handleRegister(email, password, name, isAdmin, adminPin);
    }
  };
}

window.switchAuthTab = (mode) => {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-register').classList.toggle('active', mode==='register');
  document.getElementById('register-fields').style.display = mode==='register' ? 'block' : 'none';
  document.getElementById('admin-check-wrap').style.display = mode==='register' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').textContent = mode==='login' ? 'เข้าสู่ระบบ 🚀' : 'เริ่มใช้งานฟรี ✨';
};
window.toggleAdminPin = () => {
  const show = document.getElementById('admin-check').checked;
  document.getElementById('admin-pin-wrap').style.display = show ? 'block' : 'none';
};

  const title = document.getElementById('r-title').value;
  if (!title) { showToast('กรุณากรอกชื่อ','error'); return; }
  await addDoc(collection(db,'artifacts',APP_ID,'public','data','rewards'),{
    title, points: Number(document.getElementById('r-pts').value),
    image: document.getElementById('r-emoji').value,
    type: document.getElementById('r-type').value,
  });
  STATE.addRewardForm = null; showToast('เพิ่มรางวัลแล้ว');
};
window.deleteReward = (id) => showConfirm('ลบรางวัลนี้?', async () => { await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','rewards',id)); showToast('ลบแล้ว'); });

function renderMissions() {
  const today = getTodayStr();
  const filters = ['ทั้งหมด','เบาหวาน','ความดัน','หัวใจ'];
  const valid = STATE.missions.filter(m => {
    if (m.expiresAt && m.expiresAt < today) return false;
    if (STATE.filterCategory !== 'ทั้งหมด' && m.category !== STATE.filterCategory) return false;
    return true;
  });
  return `
  <div class="page-pad">
    <h1 class="page-title">ภารกิจสุขภาพ 🎯</h1>
    <input type="file" id="mission-file" accept="image/*" capture="environment" style="display:none" onchange="handleMissionPhoto(event)"/>
    <div class="filter-row">
      ${filters.map(f=>`<button class="filter-btn ${STATE.filterCategory===f?'active':''}" onclick="setFilter('${f}')">${f}</button>`).join('')}
    </div>
    <div class="card-list">
      ${valid.length===0 ? '<p class="empty-state">ยังไม่มีภารกิจหมวดนี้</p>' : valid.map(m => {
        const done = STATE.userProgress.filter(p=>p.missionId===m.id&&p.date===today).length;
        const max = m.maxPerDay||1;
        const completed = done >= max;
        const icons = {เบาหวาน:'🚫',ความดัน:'👟',หัวใจ:'🥗'};
        const colors = {เบาหวาน:'#fee2e2',ความดัน:'#dbeafe',หัวใจ:'#d1fae5'};
        return `
        <div class="mission-card ${completed?'done':''}">
          <div class="mission-icon" style="background:${colors[m.category]||'#f3f4f6'}">${icons[m.category]||'📝'}</div>
          <div class="mission-content">
            <div class="mission-title ${completed?'strikethrough':''}">${m.title}</div>
            <div class="mission-sub">${m.subtitle||''}</div>
            <div class="mission-footer">
              <span class="pts-tag">🪙 +${m.points} pts <span class="done-count">${done}/${max}</span></span>
              ${completed
                ? '<span class="done-badge">✅ สำเร็จแล้ว</span>'
                : `<button class="btn-verify" onclick="startMission('${m.id}')">📷 ยืนยันภาพ</button>`}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function bindUserEvents() {}
window.setTab = (tab) => { STATE.activeTab = tab; render(); };
window.addWater = async () => {
if (STATE.stats.water >= 8) { showToast(‘ดื่มน้ำครบ 8 แก้วแล้ว! 💧’); return; }
const today = getTodayStr();
await updateDoc(doc(db,‘artifacts’,APP_ID,‘public’,‘data’,`stats_${STATE.user.uid}`,today),{water: STATE.stats.water+1});
};
window.addSteps = async () => {
const v = parseInt(document.getElementById(‘step-input’)?.value||0);
if (!v||v<=0) return;
const today = getTodayStr();
await updateDoc(doc(db,‘artifacts’,APP_ID,‘public’,‘data’,`stats_${STATE.user.uid}`,today),{steps: STATE.stats.steps+v});
STATE.stepInput = ‘’;
};
window.setFilter = (f) => { STATE.filterCategory = f; render(); };
window.setMeal = (m) => { STATE.activeMeal = m; render(); };

let pendingMissionId = null;
window.startMission = (id) => {
pendingMissionId = id;
document.getElementById(‘mission-file’).click();
};
window.handleMissionPhoto = async (e) => {
const file = e.target.files[0];
if (!file || !pendingMissionId) return;
const mission = STATE.missions.find(m=>m.id===pendingMissionId);
if (!mission) return;
const today = getTodayStr();
const done = STATE.userProgress.filter(p=>p.missionId===mission.id&&p.date===today).length;
if (done >= (mission.maxPerDay||1)) { showToast(‘ทำครบโควต้าแล้ว!’,‘error’); return; }
showToast(‘AI กำลังตรวจสอบ… รอสักครู่’);
const base64 = await resizeImage(file);
setTimeout(async () => {
await addDoc(collection(db,‘artifacts’,APP_ID,‘public’,‘data’,`progress_${STATE.user.uid}`),{missionId:mission.id,date:today,timestamp:Date.now(),image:base64});
await updateDoc(doc(db,‘artifacts’,APP_ID,‘public’,‘data’,‘profiles’,STATE.user.uid),{points:(STATE.user.points||0)+mission.points});
showToast(`ยืนยันสำเร็จ! ได้รับ ${mission.points} แต้ม 🎉`);
e.target.value=’’; pendingMissionId=null;
}, 2000);
};

window.handleFoodPhoto = async (e) => {
const file = e.target.files[0];
if (!file) return;
STATE.isAnalyzing = true; STATE.aiResult = null; STATE.foodImage = null; render();
try {
const base64 = await resizeImage(file);
STATE.foodImage = base64;
const analysis = await analyzeFoodWithAI(base64);
STATE.aiResult = analysis;
STATE.foodName = analysis.name !== ‘ไม่พบอาหาร’ ? analysis.name : ‘’;
} catch(err) { showToast(‘AI ขัดข้อง กรอกข้อมูลเองได้เลย’,‘error’); }
STATE.isAnalyzing = false; render();
};

window.saveMeal = async () => {
const name = document.getElementById(‘food-name’)?.value || STATE.foodName;
const note = document.getElementById(‘food-note’)?.value || STATE.foodNote;
if (!name && !STATE.foodImage) { showToast(‘กรุณาระบุชื่ออาหารหรือถ่ายรูป’,‘error’); return; }

});

showToast(‘บันทึกมื้ออาหารสำเร็จ! 🥗’);

};
window.saveProfile = async () => {
const name = document.getElementById(‘edit-name-input’)?.value;

};

window.redeemReward = (id, title, image, points) => {

});
};

.badge-item{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.badge-item.locked{opacity:.4;filter:grayscale(1)}
.badge-icon{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px}
.badge-name{font-size:11px;font-weight:800;color:#374151;max-width:72px;line-height:1.3}
.btn-rewards{width:100%;background:linear-gradient(135deg,#FF7A00,#FF004D);color:white;border:none;border-radius:24px;padding:18px;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 10px 25px rgba(255,0,77,.25);margin-bottom:12px;transition:.15s}
.btn-rewards:active{transform:scale(.98)}
.btn-logout{width:100%;background:white;color:#ef4444;border:2px solid #fecaca;border-radius:24px;padding:16px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:32px}
.rewards-header{padding:48px 20px 16px;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:12px}
.back-btn{background:#f3f4f6;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}
.reward-big-card{background:white;border-radius:24px;padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);min-height:180px}
.redeem-btn{width:100%;margin-top:auto;padding:10px;border:none;border-radius:14px;font-family:inherit;font-weight:900;font-size:13px;cursor:pointer;background:linear-gradient(135deg,#FF7A00,#f97316);color:white;box-shadow:0 4px 10px rgba(249,115,22,.25)}
.empty-state{text-align:center;color:#9ca3af;font-weight:600;padding:32px;background:white;border-radius:20px;border:2px dashed #e5e7eb}

/* SUCCESS MODAL */
#success-modal{display:none;position:absolute;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);justify-content:center;align-items:center;padding:24px}
.success-box{background:white;border-radius:36px;padding:32px;width:100%;text-align:center;border:6px solid white;box-shadow:0 0 60px rgba(0,0,0,.4);position:relative;overflow:hidden}
.success-confetti{position:absolute;font-size:80px;opacity:.08}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.page-pad,.lb-wrap>*,.mission-card,.profile-card{animation:fadeIn .3s ease}
</style>

</head>
<body>
<div id="root">
  <div style="display:flex;height:100vh;align-items:center;justify-content:center">
    <svg class="animate-pulse" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#FF004D" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
  </div>
</div>

<!-- Toast -->

<div id="toast"></div>

<!-- Confirm Dialog -->

<div class="dialog-overlay" id="confirm-dialog">
  <div class="dialog-box">
    <div class="dialog-title" id="confirm-text"></div>
    <div class="dialog-btns">
      <button class="btn-cancel" id="confirm-cancel">ยกเลิก</button>
      <button class="btn-confirm" id="confirm-ok">ยืนยัน</button>
    </div>
  </div>
</div>

<!-- Prompt Dialog -->

<div class="dialog-overlay" id="prompt-dialog">
  <div class="dialog-box">
    <div class="dialog-title" id="prompt-title"></div>
    <p style="color:#888;font-size:13px;margin-bottom:16px" id="prompt-desc"></p>
    <input type="number" id="prompt-input" class="input-field" style="text-align:center;font-size:28px;font-weight:900;color:#10b981"/>
    <div class="dialog-btns">
      <button class="btn-cancel" id="prompt-cancel">ยกเลิก</button>
      <button class="btn-confirm" style="background:#10b981;box-shadow:0 8px 20px rgba(16,185,129,.3)" id="prompt-ok">บันทึก</button>
    </div>
  </div>
</div>

<!-- Success Modal -->

<div id="success-modal">
  <div class="success-box">
    <div class="success-confetti" style="top:-20px;left:-20px">🎉</div>
    <div class="success-confetti" style="bottom:-20px;right:-20px">⭐</div>
    <div style="font-size:72px;margin-bottom:12px">🎉</div>
    <h2 style="font-size:32px;font-weight:900;background:linear-gradient(135deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">ยินดีด้วย!</h2>
    <p style="font-weight:700;margin-bottom:8px">คุณได้แลกรางวัล:</p>
    <p style="font-size:20px;font-weight:900;color:#111;margin-bottom:20px;padding:16px;background:#f9fafb;border-radius:16px" id="success-title"></p>
    <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:20px;padding:20px;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">📱</div>
      <p style="font-weight:800;font-size:16px;color:#92400e;margin-bottom:12px">📸 กรุณาแคปหน้าจอนี้</p>
      <div style="background:#06C755;padding:14px;border-radius:14px;cursor:pointer">
        <span style="color:white;font-weight:900;font-size:16px">ส่งหลักฐานผ่าน LINE</span>
      </div>
    </div>
    <button onclick="document.getElementById('success-modal').style.display='none'" style="width:100%;background:#111;color:white;border:none;padding:16px;border-radius:20px;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer">รับทราบ ปิดหน้าต่าง</button>
  </div>
</div>

</body>
</html>
