const toast = (msg,type='ok') => {
  const t=document.getElementById('toast');
  t.innerHTML='<div class="toast'+(type==='err'?' toast-error':'')+'">'+msg+'</div>';
  t.style.display='flex'; setTimeout(()=>t.style.display='none',3000);
};
const confirm = (txt,fn) => {
  const el=document.getElementById('confirm-dialog');
  document.getElementById('confirm-text').textContent=txt;
  el.style.display='flex';
  document.getElementById('confirm-ok').onclick=()=>{el.style.display='none';fn();};
  document.getElementById('confirm-cancel').onclick=()=>el.style.display='none';
};
const prompt_ = (title,desc,def,fn) => {
  const el=document.getElementById('prompt-dialog');
  document.getElementById('prompt-title').textContent=title;
  document.getElementById('prompt-desc').textContent=desc;
  document.getElementById('prompt-input').value=def;
  el.style.display='flex';
  document.getElementById('prompt-ok').onclick=()=>{el.style.display='none';fn(document.getElementById('prompt-input').value);};
  document.getElementById('prompt-cancel').onclick=()=>el.style.display='none';
};

let aMode='login';
const bindAuth = () => {
  document.getElementById('abtn').onclick = async () => {
    const email=document.getElementById('iemail').value;
    const pass=document.getElementById('ipass').value;
    if (!email||!pass) { toast('กรุณากรอกอีเมลและรหัสผ่าน','err'); return; }
    if (aMode==='login') {
      const eid=clean(email);
      const snap=await getDoc(doc(db,'artifacts',AID,'public','data','auth',eid));
      if (!snap.exists()) { toast('ไม่พบบัญชีนี้','err'); return; }
      const d=snap.data();
      if (d.password!==pass) { toast('รหัสผ่านไม่ถูกต้อง','err'); return; }
      const ps=await getDoc(doc(db,'artifacts',AID,'public','data','profiles',d.uid));
      if (ps.exists()) { S.user=ps.data(); try{localStorage.setItem('vv_uid_v10',S.user.uid);}catch(e){} if(S.user.role==='user')setupUser(S.user.uid); toast('เข้าสู่ระบบสำเร็จ! 🚀'); R(); }
    } else {
      const name=document.getElementById('iname').value;
      if (!name) { toast('กรุณากรอกชื่อ','err'); return; }
      const isAdmin=document.getElementById('adminck').checked;
      const pin=isAdmin?document.getElementById('ipin').value:'';
      if (isAdmin&&pin!==ADMIN_PIN) { toast('รหัสลับแอดมินไม่ถูกต้อง!','err'); return; }
      const eid=clean(email);
      const snap=await getDoc(doc(db,'artifacts',AID,'public','data','auth',eid));
      if (snap.exists()) { toast('อีเมลนี้ถูกใช้แล้ว','err'); return; }
      const uid='USR_'+Date.now()+Math.random().toString(36).substring(2,8);
      const role=isAdmin?'admin':'user';
      const avatar='https://api.dicebear.com/7.x/notionists/svg?seed='+encodeURIComponent(name);
      await setDoc(doc(db,'artifacts',AID,'public','data','auth',eid),{email:eid,password:pass,uid,role});
      const profile={uid,name,role,points:0,level:1,avatar};
      await setDoc(doc(db,'artifacts',AID,'public','data','profiles',uid),profile);
      S.user=profile; try{localStorage.setItem('vv_uid_v10',uid);}catch(e){} if(role==='user')setupUser(uid); toast('สร้างบัญชีสำเร็จ! 🎉'); R();
    }
  };
};
window._sw = mode => { aMode=mode; document.getElementById('tl').classList.toggle('active',mode==='login'); document.getElementById('tr').classList.toggle('active',mode==='reg'); document.getElementById('regf').style.display=mode==='reg'?'block':'none'; document.getElementById('adminwrap').style.display=mode==='reg'?'block':'none'; document.getElementById('abtn').textContent=mode==='login'?'เข้าสู่ระบบ 🚀':'เริ่มใช้งานฟรี ✨'; };
window._togglePin = () => { document.getElementById('pinwrap').style.display=document.getElementById('adminck').checked?'block':'none'; };

const setupUser = uid => {
  const t=today();
  const sr=doc(db,'artifacts',AID,'public','data','stats_'+uid,t);
  onSnapshot(sr,snap=>{ if(snap.exists())S.stats=snap.data(); else{S.stats={water:0,steps:0};setDoc(sr,{water:0,steps:0});} R(); });
  onSnapshot(collection(db,'artifacts',AID,'public','data','progress_'+uid),snap=>{ S.progress=snap.docs.map(d=>d.data()); R(); });
  onSnapshot(collection(db,'artifacts',AID,'public','data','logs_'+uid),snap=>{ S.logs=snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.date===t).sort((a,b)=>b.timestamp-a.timestamp); R(); });

      </div>`:''}
      <input class="input-field" id="fname" placeholder="ชื่อเมนูอาหาร" value="${S.foodName}" oninput="S.foodName=this.value"/>
      <textarea class="input-field" id="fnote" placeholder="พฤติกรรมการปรุง เช่น ไม่ใส่น้ำตาล" rows="2" style="resize:none">${S.foodNote}</textarea>
      <button class="btn-primary" style="background:linear-gradient(135deg,#f43f5e,#fb923c)" onclick="window._savemeal()">💾 บันทึกมื้อนี้</button>
      ${S.logs.length>0?`<h3 style="font-weight:800;margin:20px 0 12px">ประวัติวันนี้</h3><div class="log-list">${S.logs.map(l=>`<div class="log-item"><div class="log-img">${l.image?`<img src="${l.image}" style="width:100%;height:100%;object-fit:cover;border-radius:12px"/>`:'🍽️'}</div><div><div style="font-weight:800">${l.name}</div>${l.ai_data?`<div style="font-size:11px;color:#f97316;background:#fff7ed;padding:2px 8px;border-radius:6px;display:inline-block;margin-top:4px">🔥 ${l.ai_data.calories} kcal</div>`:''}</div></div>`).join('')}</div>`:''}
    </div>
  </div>`;
};

const lbHTML = () => {
  const me=S.leaderboard.find(u=>u.uid===S.user.uid);
  return `<div class="lb-wrap fade">
    <div style="text-align:center;padding:48px 20px 24px">
      <h1 style="font-size:40px;font-weight:900;color:#111;margin:0">Leaderboard</h1>
    </div>
    <div style="padding:0 16px">
      ${S.leaderboard.slice(0,10).map(u=>`<div class="lb-row${u.uid===S.user.uid?' me':''}">
        <div style="width:36px;text-align:center;font-size:24px;font-weight:900;color:#d1d5db">${u.rank<=3?['🥇','🥈','🥉'][u.rank-1]:u.rank}</div>
        <img src="${u.avatar}" class="lb-avatar" onerror="this.src='https://api.dicebear.com/7.x/notionists/svg?seed=x'"/>
        <div style="flex:1;min-width:0"><div class="lb-name">${u.name}${u.uid===S.user.uid?'<span class="you-badge">คุณ</span>':''}</div><div class="lb-pts">${(u.points||0).toLocaleString()} pts</div></div>
      </div>`).join('')||'<p class="empty-state">ยังไม่มีผู้ใช้งาน</p>'}
    </div>
    ${me?`<div class="my-rank"><img src="${me.avatar}" class="lb-avatar" onerror="this.src='https://api.dicebear.com/7.x/notionists/svg?seed=x'"/><div><div style="font-size:11px;color:#93c5fd;font-weight:700">อันดับของคุณ</div><div style="font-size:28px;font-weight:900;color:white"># ${me.rank}</div></div><div style="margin-left:auto;text-align:right"><div style="font-size:11px;color:#93c5fd;font-weight:700">คะแนนรวม</div><div style="font-size:24px;font-weight:900;color:#fde68a">${(me.points||0).toLocaleString()}</div></div></div>`:''}
  </div>`;
};

const profileHTML = () => {
  const u=S.user;
  return `<div class="page-pad fade">
    <div class="profile-card">
      <img src="${u.avatar}" class="avatar-lg" onerror="this.src='https://api.dicebear.com/7.x/notionists/svg?seed=x'"/>
      <h2 style="font-size:28px;font-weight:900;color:#111;margin:12px 0 4px">${u.name}</h2>
      <div class="lv-badge">⭐ Level ${u.level||1} Explorer</div>
      <button class="btn-edit" onclick="window._editOpen()">✏️ แก้ไขโปรไฟล์</button>
    </div>
    ${S.editMode?`<div class="edit-overlay"><div class="edit-modal"><button class="close-btn" onclick="window._editClose()">✕</button><h3 style="font-weight:900;font-size:24px;text-align:center;margin-bottom:24px">แก้ไขข้อมูล</h3><input type="file" id="avfile" accept="image/*" style="display:none" onchange="window._avchange(event)"/><div style="position:relative;width:120px;height:120px;margin:0 auto 20px;cursor:pointer" onclick="document.getElementById('avfile').click()"><img id="avprev" src="${S.editAvatar||u.avatar}" class="avatar-lg" style="width:120px;height:120px" onerror="this.src='https://api.dicebear.com/7.x/notionists/svg?seed=x'"/></div><input class="input-field" id="ename" type="text" value="${S.editName||u.name}" placeholder="ชื่อแสดงผล"/><button class="btn-primary" onclick="window._saveProfile()">💾 บันทึก</button></div></div>`:''}
    <div class="weekly-card"><h3 style="font-weight:800;margin-bottom:16px">📊 สรุปรายสัปดาห์ (AI)</h3><div class="eval-row"><div class="eval-item"><div style="font-size:32px">🍬</div><div>ลดหวาน</div><div>⭐⭐⭐⭐☆</div></div><div class="eval-item"><div style="font-size:32px">🧂</div><div>ลดเค็ม</div><div>⭐⭐⭐⭐⭐</div></div><div class="eval-item"><div style="font-size:32px">💧</div><div>ลดมัน</div><div>⭐⭐⭐☆☆</div></div></div><div class="ai-advice">"สัปดาห์นี้ลดเค็มได้เยี่ยม! รักษาระดับนี้นะครับ 👏"</div></div>
    <div class="badges-card"><h3 style="font-weight:800;margin-bottom:16px">🏅 รางวัลความสำเร็จ</h3><div class="badges-row"><div class="badge-item"><div class="badge-icon" style="background:#dbeafe">🛡️</div><div class="badge-name">นักลดเค็มมือโปร</div></div><div class="badge-item"><div class="badge-icon" style="background:#d1fae5">🏅</div><div class="badge-name">พิชิต 7 วัน</div></div><div class="badge-item" style="opacity:.4;filter:grayscale(1)"><div class="badge-icon" style="background:#f3f4f6">🏃</div><div class="badge-name">แสนก้าว</div></div></div></div>
    <button class="btn-rewards" onclick="S.showRewards=true;R()">🎁 ร้านค้าแลกของรางวัล</button>
    <button class="btn-logout" onclick="window._logout()">🚪 ออกจากระบบ</button>
  </div>`;
};

const rewardsHTML = () => {
  const tab=S.rewardsTab||'virtual';
  const list=S.rewards.filter(r=>r.type===tab);
  return `<div class="rewards-wrap fade">
    <div class="rewards-header"><button class="back-btn" onclick="S.showRewards=false;R()">←</button><h1 style="font-weight:900;font-size:20px;margin:0">แลกของรางวัล</h1></div>
    <div style="text-align:center;padding:24px;border-bottom:1px solid #f0f0f0"><div style="color:#888;font-weight:700;font-size:12px;margin-bottom:8px">คะแนนคงเหลือ</div><div style="font-size:52px;font-weight:900">🪙 ${(S.user.points||0).toLocaleString()}</div></div>
    <div style="display:flex;gap:4px;margin:16px;background:#f5f5f5;padding:4px;border-radius:14px">
      <button class="tab-btn${tab==='virtual'?' active':''}" onclick="S.rewardsTab='virtual';R()">ในเกม (Virtual)</button>
      <button class="tab-btn${tab==='physical'?' active':''}" onclick="S.rewardsTab='physical';R()">ของจริง (Physical)</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 16px 80px;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start">
      ${list.length===0?'<p class="empty-state" style="grid-column:1/-1">ยังไม่มีรางวัลหมวดนี้</p>':list.map(r=>`<div class="reward-big-card"><div style="font-size:52px;margin:8px 0">${r.image}</div><div style="font-weight:800;font-size:13px;margin-bottom:auto">${r.title}</div><button class="redeem-btn" onclick="window._redeem('${r.id}','${r.title}','${r.image}',${r.points})">แลกเลย ${r.points.toLocaleString()}</button></div>`).join('')}
    </div>
  </div>`;
};

window._tab = t => { S.tab=t; R(); };
window._logout = () => confirm('คุณต้องการออกจากระบบ?',()=>{ S.user=null; try{localStorage.removeItem('vv_uid_v10');}catch(e){} toast('ออกจากระบบแล้ว'); R(); });
window._water = async () => { if(S.stats.water>=8){toast('ดื่มน้ำครบ 8 แก้วแล้ว! 💧');return;} await updateDoc(doc(db,'artifacts',AID,'public','data','stats_'+S.user.uid,today()),{water:S.stats.water+1}); };
window._steps = async () => { const v=parseInt(document.getElementById('stepinput')?.value||0); if(!v||v<=0)return; await updateDoc(doc(db,'artifacts',AID,'public','data','stats_'+S.user.uid,today()),{steps:S.stats.steps+v}); S.stepVal=''; };
window._filter = f => { S.filter=f; R(); };
window._meal = m => { S.meal=m; R(); };

let pendM=null;
window._startM = id => { pendM=id; document.getElementById('mfile').click(); };
window._mphoto = async e => {
  const file=e.target.files[0]; if(!file||!pendM)return;
  const m=S.missions.find(x=>x.id===pendM); if(!m)return;
  const t=today();
  const done=S.progress.filter(p=>p.missionId===m.id&&p.date===t).length;
  if(done>=(m.maxPerDay||1)){toast('ทำครบโควต้าแล้ว!','err');return;}
  toast('AI กำลังตรวจสอบ... รอสักครู่');
  const b64=await resize(file);
  setTimeout(async()=>{
    await addDoc(collection(db,'artifacts',AID,'public','data','progress_'+S.user.uid),{missionId:m.id,date:t,timestamp:Date.now(),image:b64});
    await updateDoc(doc(db,'artifacts',AID,'public','data','profiles',S.user.uid),{points:(S.user.points||0)+m.points});
    toast('ยืนยันสำเร็จ! ได้รับ '+m.points+' แต้ม 🎉');
    e.target.value=''; pendM=null;
  },2000);
};

window._fphoto = async e => {
  const file=e.target.files[0]; if(!file)return;
  S.analyzing=true; S.aiResult=null; S.foodImg=null; R();
  try {
    const b64=await resize(file);
    S.foodImg=b64;
    const result=await aiFood(b64);
    S.aiResult=result;
    S.foodName=result.name!=='ไม่พบอาหาร'?result.name:'';
  } catch(err) { toast('AI ขัดข้อง กรอกข้อมูลเองได้เลย','err'); }
  S.analyzing=false; R();
};
window._savemeal = async () => {
  const name=document.getElementById('fname')?.value||S.foodName;
  const note=document.getElementById('fnote')?.value||S.foodNote;
  if(!name&&!S.foodImg){toast('กรุณาระบุชื่ออาหารหรือถ่ายรูป','err');return;}
  await addDoc(collection(db,'artifacts',AID,'public','data','logs_'+S.user.uid),{meal:S.meal,name:name||'เมนูระบุไม่ได้',note,image:S.foodImg,ai_data:S.aiResult||null,date:today(),timestamp:Date.now()});
  S.foodName=''; S.foodNote=''; S.foodImg=null; S.aiResult=null;
  toast('บันทึกมื้ออาหารสำเร็จ! 🥗');
};
window._editOpen = () => { S.editMode=true; S.editName=S.user.name; S.editAvatar=S.user.avatar; R(); };
window._editClose = () => { S.editMode=false; R(); };
window._avchange = async e => { const f=e.target.files[0]; if(f){const b64=await resize(f,200);S.editAvatar=b64;const el=document.getElementById('avprev');if(el)el.src=b64;} };
window._saveProfile = async () => { const n=document.getElementById('ename')?.value; if(!n){toast('กรุณาใส่ชื่อ','err');return;} await updateDoc(doc(db,'artifacts',AID,'public','data','profiles',S.user.uid),{name:n,avatar:S.editAvatar||S.user.avatar}); S.editMode=false; toast('อัปเดตโปรไฟล์แล้ว! 🌟'); };
window._redeem = (id,title,image,points) => {
  if((S.user.points||0)<points){toast('คะแนนไม่พอ!','err');return;}
  confirm('ยืนยันแลก "'+title+'" ด้วย '+points+' แต้ม?',async()=>{
    await updateDoc(doc(db,'artifacts',AID,'public','data','profiles',S.user.uid),{points:(S.user.points||0)-points});
    document.getElementById('success-modal').style.display='flex';
    document.getElementById('success-title').textContent=image+' '+title;
    S.showRewards=false;
  });
};

// INIT
R();
signInAnonymously(auth).catch(e=>console.log('auth:',e));
onAuthStateChanged(auth, async firebaseUser => {
  if (!firebaseUser) return;
  onSnapshot(collection(db,'artifacts',AID,'public','data','missions'),snap=>{
    const d=snap.docs.map(x=>({id:x.id,...x.data()}));
    if(d.length===0){[{title:'ลาขาดหวาน 1 วัน',subtitle:'งดเครื่องดื่มและขนมหวาน',points:20,category:'เบาหวาน',maxPerDay:1,expiresAt:''},{title:'เดิน 30 นาที',subtitle:'เดินออกกำลังกาย 30 นาที',points:30,category:'ความดัน',maxPerDay:1,expiresAt:''},{title:'กินผักผลไม้ 5 สี',subtitle:'ทานผักผลไม้หลากหลาย',points:25,category:'หัวใจ',maxPerDay:3,expiresAt:''}].forEach(m=>addDoc(collection(db,'artifacts',AID,'public','data','missions'),m));}
    else{S.missions=d;R();}
  });
  onSnapshot(collection(db,'artifacts',AID,'public','data','rewards'),snap=>{
    const d=snap.docs.map(x=>({id:x.id,...x.data()}));
    if(d.length===0){[{title:'คูปองตรวจสุขภาพ',points:5000,image:'🎟️',type:'physical'},{title:'ชุดของขวัญสุขภาพ',points:3500,image:'🧺',type:'physical'},{title:'แก้วน้ำเก็บอุณหภูมิ',points:1500,image:'🥤',type:'physical'},{title:'กรอบโปรไฟล์พิเศษ',points:500,image:'🖼️',type:'virtual'},{title:'ตราสัญลักษณ์ VIP',points:1000,image:'👑',type:'virtual'}].forEach(r=>addDoc(collection(db,'artifacts',AID,'public','data','rewards'),r));}
    else{S.rewards=d;R();}
  });
  onSnapshot(collection(db,'artifacts',AID,'public','data','profiles'),snap=>{
    const ps=snap.docs.map(d=>d.data());
    S.leaderboard=ps.filter(u=>u.role==='user').sort((a,b)=>b.points-a.points).map((u,i)=>({...u,rank:i+1}));
    if(S.user){const up=ps.find(u=>u.uid===S.user.uid);if(up)S.user=up;}
    R();
  });
  try {
    const saved=localStorage.getItem('vv_uid_v10');
    if(saved&&!S.user){
      const snap=await getDoc(doc(db,'artifacts',AID,'public','data','profiles',saved));
      if(snap.exists()){S.user=snap.data();if(S.user.role==='user')setupUser(S.user.uid);R();}
    }
  } catch(e){}
});
</script>
</body>
</html>
