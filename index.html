    // --- Configuration ---
    const firebaseConfig = {
      apiKey: "AIzaSyA6pLMExFN2d7oVQKLldcB_ahB5-o4zw_E",
      authDomain: "vitalvibe-c0306.firebaseapp.com",
      projectId: "vitalvibe-c0306",
      storageBucket: "vitalvibe-c0306.firebasestorage.app",
      messagingSenderId: "18887442289",
      appId: "1:18887442289:web:0b917a9e043b44b4ec80d0",

    };
    const app = initializeApp(firebaseConfig);

    const ADMIN_PIN = "kira5642"; 

    // --- Helpers ---
    const getTodayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    // คำนวณสัปดาห์ปัจจุบัน (2024-W42) เพื่อใช้รีเซ็ตคะแนน
    const getWeekStr = () => {
      const d = new Date();
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() + 4 - (d.getDay() || 7)); 
      const yearStart = new Date(d.getFullYear(), 0, 1);
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    };

    // ดึงวันที่ย้อนหลัง 7 วัน
    const getPast7Days = () => {
      const dates = [];
      for(let i=0; i<7; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      }
      return dates;
    };

    const cleanEmail = (email) => email.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');

    const resizeImage = (file, maxSize = 600) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
          else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.6)); 
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    const analyzeFoodWithAI = async (base64Image) => {
      const prompt = `คุณคือนักโภชนาการ AI วิเคราะห์ภาพอาหารนี้และตอบกลับเป็น JSON format เท่านั้น:
      {
        "name": "ชื่อเมนูอาหาร (ถ้าไม่ใช่อาหารให้ตอบ 'ไม่พบอาหาร')",
        "calories": ตัวเลขแคลอรี่โดยประมาณ (number),
        "sugar": "ต่ำ/ปานกลาง/สูง",
        "sodium": "ต่ำ/ปานกลาง/สูง",
        "fat": "ต่ำ/ปานกลาง/สูง",
        "advice": "คำแนะนำสั้นๆ 1 ประโยค"
      }`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ role: "user", parts: [ { text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image.split(',')[1] } } ] }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });
        const data = await response.json();
        return JSON.parse(data.candidates[0].content.parts[0].text);
      } catch (error) {
        throw new Error("AI Analysis Failed");
      }
    };

    // --- Seed Data ---
    const DEFAULT_MISSIONS = [
      { title: 'ลาขาดหวาน 1 วัน', subtitle: 'งดเครื่องดื่มและขนมหวานทุกชนิด', points: 20, maxPerDay: 1, expiresAt: '' },
      { title: 'เดิน 30 นาที', subtitle: 'เดินออกกำลังกายต่อเนื่อง 30 นาที', points: 30, maxPerDay: 1, expiresAt: '' },
      { title: 'กินผักผลไม้ 5 สี', subtitle: 'ทานผักและผลไม้ให้หลากหลาย', points: 25, maxPerDay: 3, expiresAt: '' },
    ];
    const DEFAULT_REWARDS = [
      { title: 'คูปองตรวจสุขภาพ รพ.', points: 5000, image: '🎟️' },
      { title: 'ชุดของขวัญสุขภาพ', points: 3500, image: '🧺' },
      { title: 'แก้วน้ำเก็บอุณหภูมิ', points: 1500, image: '🥤' },
    ];

    function MainApp() {
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [appUser, setAppUser] = useState(null);
      const [allProfiles, setAllProfiles] = useState([]);
      
      const [globalMissions, setGlobalMissions] = useState([]);
      const [globalRewards, setGlobalRewards] = useState([]);
      const [leaderboard, setLeaderboard] = useState([]);
      const [userProgress, setUserProgress] = useState([]); 
      
      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [promptDialog, setPromptDialog] = useState(null);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) { } 
          finally { setFirebaseReady(true); }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, () => { setFirebaseReady(true); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!firebaseReady) return;

        const missionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'missions');
        const unsubM = onSnapshot(missionsRef, (snap) => {
          const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          if (loaded.length === 0) DEFAULT_MISSIONS.forEach(m => addDoc(missionsRef, m));
          else setGlobalMissions(loaded);
        }, (error) => {});

        const rewardsRef = collection(db, 'artifacts', appId, 'public', 'data', 'rewards');
        const unsubR = onSnapshot(rewardsRef, (snap) => {
          const loaded = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          if (loaded.length === 0) DEFAULT_REWARDS.forEach(r => addDoc(rewardsRef, r));
          else setGlobalRewards(loaded);
        }, (error) => {});

        const profilesRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
        const unsubP = onSnapshot(profilesRef, (snap) => {
          const loadedProfiles = snap.docs.map(d => d.data());
          setAllProfiles(loadedProfiles);
          
          const currentWeekStr = getWeekStr();
          
          // จัดอันดับ Real-time เฉพาะคะแนนสัปดาห์นี้
          const ranked = loadedProfiles
            .filter(u => u.role === 'user')
            .map(u => ({
               ...u,
               weeklyPoints: u.currentWeek === currentWeekStr ? (u.weeklyPoints || 0) : 0
            }))
            .sort((a,b) => b.weeklyPoints - a.weeklyPoints)
            .map((u, i) => ({ ...u, rank: i + 1 }));
            
          setLeaderboard(ranked);

          try {
            const savedSession = localStorage.getItem('vv_uid_v12');
            if (savedSession && !appUser) {
              const userObj = loadedProfiles.find(u => u.uid === savedSession);
              if (userObj) setAppUser(userObj);
            }
          } catch(e) {}

          setAppUser(current => {
            if (!current) return null;
            const updated = loadedProfiles.find(u => u.uid === current.uid);
            return updated || current;
          });
        }, (error) => {});

        return () => { unsubM(); unsubR(); unsubP(); };
      }, [firebaseReady]);

      useEffect(() => {
        if (!appUser?.uid || appUser.role === 'admin') return;
        const progressRef = collection(db, 'artifacts', appId, 'public', 'data', `progress_${appUser.uid}`);
        const unsubProgress = onSnapshot(progressRef, (snapshot) => {
          setUserProgress(snapshot.docs.map(d => d.data()));
        }, (error) => {});
        return () => unsubProgress();
      }, [appUser?.uid]);

      const handleRegister = async (email, password, name, isAdminLogin, adminPin) => {
        if (isAdminLogin && adminPin !== ADMIN_PIN) {
          showToast('รหัสลับผู้ดูแลระบบไม่ถูกต้อง!', 'error');
          throw new Error('รหัสลับผู้ดูแลระบบไม่ถูกต้อง!');
        }
        
        const eid = cleanEmail(email);
        const authRef = doc(db, 'artifacts', appId, 'public', 'data', 'auth', eid);
        const docSnap = await getDoc(authRef);
        if (docSnap.exists()) {
          showToast('อีเมลนี้ถูกใช้งานแล้ว กรุณาล็อคอิน', 'error');
          throw new Error('อีเมลนี้ถูกใช้งานแล้ว');
        }

        const uid = 'USR_' + Date.now() + Math.random().toString(36).substring(2, 8);
        const role = isAdminLogin ? 'admin' : 'user';
        const avatar = 'https://api.dicebear.com/7.x/notionists/svg?seed=' + encodeURIComponent(name);

        await setDoc(authRef, { email: eid, password, uid, role });
        const profile = { uid, name, role, points: 0, weeklyPoints: 0, currentWeek: getWeekStr(), level: 1, avatar };
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', uid), profile);

        setAppUser(profile);
        try { localStorage.setItem('vv_uid_v12', uid); } catch(e){}
        showToast('สร้างบัญชีสำเร็จ! ยินดีต้อนรับ 🎉');
      };

      const handleLogin = async (email, password) => {
        const eid = cleanEmail(email);
        const authRef = doc(db, 'artifacts', appId, 'public', 'data', 'auth', eid);
        const docSnap = await getDoc(authRef);
        
        if (!docSnap.exists()) {
          showToast('ไม่พบบัญชีนี้ กรุณาสมัครสมาชิก', 'error');
          throw new Error('ไม่พบบัญชีนี้');
        }
        const authData = docSnap.data();
        if (authData.password !== password) {
          showToast('รหัสผ่านไม่ถูกต้อง', 'error');
          throw new Error('รหัสผ่านไม่ถูกต้อง');
        }

        const profileSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', authData.uid));
        if (profileSnap.exists()) {
          const profile = profileSnap.data();
          setAppUser(profile);
          try { localStorage.setItem('vv_uid_v12', profile.uid); } catch(e){}
          showToast('เข้าสู่ระบบสำเร็จ! 🚀');
        }
      };

      const handleLogout = () => {
        setConfirmDialog({
          text: 'คุณต้องการออกจากระบบหรือไม่?',
          onConfirm: () => {
            setAppUser(null);
            try { localStorage.removeItem('vv_uid_v12'); } catch(e){}
            showToast('ออกจากระบบเรียบร้อย');
          }
        });
      };

      const handleUpdateProfile = async (newName, newAvatar, newEmail, newPassword, currentAuthId) => {
        if (!appUser) return;
        try {
          const updates = { name: newName };
          if (newAvatar) updates.avatar = newAvatar;
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', appUser.uid), updates);

          if (newEmail && newPassword && currentAuthId) {
             const cleanNewEmail = cleanEmail(newEmail);
             if (cleanNewEmail !== currentAuthId) {
                const newAuthRef = doc(db, 'artifacts', appId, 'public', 'data', 'auth', cleanNewEmail);
                const checkSnap = await getDoc(newAuthRef);
                if (checkSnap.exists()) {
                   showToast('อีเมลนี้มีผู้ใช้งานแล้ว ไม่สามารถเปลี่ยนได้', 'error');
                   return;
                }
                await setDoc(newAuthRef, { email: cleanNewEmail, password: newPassword, uid: appUser.uid, role: appUser.role });
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'auth', currentAuthId));
             } else {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'auth', currentAuthId), { password: newPassword });
             }
          }

          showToast("อัปเดตโปรไฟล์สำเร็จ! 🌟");
        } catch(e) { 
          showToast("เกิดข้อผิดพลาดในการอัปเดต", "error"); 
        }
      };

      if (!firebaseReady) return <LoadingScreen />;

      return (
        <div className="relative bg-gray-900 font-sans h-full w-full flex justify-center">
          <div className="w-full max-w-md bg-white h-full relative overflow-hidden shadow-2xl flex flex-col">
            {!appUser ? (
              <AuthScreen onLogin={handleLogin} onRegister={handleRegister} />
            ) : appUser.role === 'admin' ? (
              <AdminApp 
                missions={globalMissions} rewards={globalRewards} leaderboard={leaderboard} 
                onLogout={handleLogout} db={db} appId={appId} 
                setConfirmDialog={setConfirmDialog} setPromptDialog={setPromptDialog} showToast={showToast}
              />
            ) : (
              <UserApp 
                profile={appUser} missions={globalMissions} rewards={globalRewards} leaderboard={leaderboard}
                userProgress={userProgress}
                onLogout={handleLogout} onUpdateProfile={handleUpdateProfile}
                db={db} appId={appId} setConfirmDialog={setConfirmDialog} showToast={showToast}
              />
            )}

            {toast && (
              <div className="absolute top-10 left-1/2 -translate-x-1/2 z-[999] animate-slide-down w-11/12 max-w-sm">
                <div className={`px-6 py-4 rounded-2xl font-black shadow-2xl flex items-center gap-3 text-white tracking-wide border-2 ${toast.type === 'error' ? 'bg-red-500 border-red-400' : 'bg-gray-900 border-gray-700'}`}>
                  {toast.type === 'error' ? <AlertCircle size={24}/> : <CheckCircle size={24}/>} 
                  <span className="flex-1 leading-tight">{toast.message}</span>
                </div>
              </div>
            )}

            {confirmDialog && (
              <div className="absolute inset-0 z-[1000] bg-black/60 backdrop-blur-md flex items-center justify-center p-6 animate-fade-in">
                <div className="bg-white rounded-[2.5rem] p-8 w-full text-center shadow-2xl border-[4px] border-white/20">
                  <h3 className="text-2xl font-black text-gray-800 mb-8 leading-tight">{confirmDialog.text}</h3>
                  <div className="flex gap-4">
                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-4 bg-gray-100 text-gray-600 font-black rounded-[1.5rem] hover:bg-gray-200 transition">ยกเลิก</button>
                    <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className="flex-1 py-4 bg-red-500 text-white font-black rounded-[1.5rem] shadow-[0_10px_25px_rgba(239,68,68,0.4)] hover:scale-[1.02] active:scale-95 transition">ยืนยัน</button>
                  </div>
                </div>
              </div>
            )}

            {promptDialog && (
              <div className="absolute inset-0 z-[1000] bg-black/60 backdrop-blur-md flex items-center justify-center p-6 animate-fade-in">
                <div className="bg-white rounded-[2.5rem] p-8 w-full shadow-2xl border-[4px] border-white/20">
                  <h3 className="text-2xl font-black text-gray-800 mb-2">{promptDialog.title}</h3>
                  <p className="text-sm font-bold text-gray-500 mb-6">{promptDialog.description}</p>
                  <input 
                    type="number" autoFocus id="prompt-input" defaultValue={promptDialog.defaultValue} 
                    className="w-full bg-gray-50 border-2 border-teal-400 rounded-2xl p-4 text-center text-3xl font-black text-teal-600 outline-none mb-6 shadow-inner" 
                  />
                  <div className="flex gap-4">
                    <button onClick={() => setPromptDialog(null)} className="flex-1 py-4 bg-gray-100 text-gray-600 font-black rounded-[1.5rem] hover:bg-gray-200 transition">ยกเลิก</button>
                    <button onClick={() => { 
                      const val = document.getElementById('prompt-input').value;
                      promptDialog.onConfirm(val); 
                      setPromptDialog(null); 
                    }} className="flex-1 py-4 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-black rounded-[1.5rem] shadow-[0_10px_25px_rgba(20,184,166,0.4)] hover:scale-[1.02] active:scale-95 transition">บันทึก</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 1. AUTH SCREEN
    // ==========================================
    function AuthScreen({ onLogin, onRegister }) {
      const [isLogin, setIsLogin] = useState(true);
      const [isAdminLogin, setIsAdminLogin] = useState(false);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [adminPin, setAdminPin] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          if (isLogin) await onLogin(email, password);
          else {
            if (!name.trim()) throw new Error('กรุณากรอกชื่อของคุณ');
            await onRegister(email, password, name, isAdminLogin, adminPin);
          }
        } catch (err) { } 
        finally { setLoading(false); }
      };

      return (
        <div className="h-full w-full bg-gradient-to-br from-[#84fab0] via-[#8fd3f4] to-[#a1c4fd] p-6 relative overflow-y-auto hide-scrollbar">
          <div className="absolute top-[-5%] left-[-10%] w-64 h-64 bg-teal-300 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
          <div className="absolute bottom-[10%] right-[-10%] w-64 h-64 bg-emerald-300 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

          <div className="bg-white/95 backdrop-blur-xl rounded-[3rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.1)] text-center border-[4px] border-white relative z-10 mt-6 pb-12">
            <div className="w-24 h-24 bg-gradient-to-tr from-teal-400 to-emerald-500 text-white rounded-[2.5rem] shadow-[0_15px_30px_rgba(16,185,129,0.3)] flex items-center justify-center mx-auto mb-6 transform rotate-3">
              <HeartPulse size={48} strokeWidth={2.5} />
            </div>
            <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-emerald-500 tracking-tight mb-2">VitalVibe</h1>
            <p className="text-gray-500 font-bold mb-8">คอมมูนิตี้คนรักสุขภาพ 🌟</p>

            <form onSubmit={handleSubmit} className="space-y-4 text-left">
              <div className="flex bg-gray-100 p-1.5 rounded-[1.2rem] mb-6 shadow-inner">
                <button type="button" onClick={() => setIsLogin(true)} className={`flex-1 py-3.5 text-sm font-black rounded-xl transition-all ${isLogin ? 'bg-white text-teal-600 shadow-md' : 'text-gray-400 hover:text-gray-600'}`}>เข้าสู่ระบบ</button>
                <button type="button" onClick={() => setIsLogin(false)} className={`flex-1 py-3.5 text-sm font-black rounded-xl transition-all ${!isLogin ? 'bg-white text-teal-600 shadow-md' : 'text-gray-400 hover:text-gray-600'}`}>สร้างบัญชีใหม่</button>
              </div>

              {!isLogin && (
                <div className="relative animate-fade-in">
                  <User className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                  <input type="text" placeholder="ชื่อที่ใช้แสดงผล" required value={name} onChange={e=>setName(e.target.value)} className="w-full bg-gray-50 border-2 border-transparent focus:border-teal-400 rounded-2xl p-4 pl-12 text-gray-800 font-bold outline-none transition" />
                </div>
              )}

              <div className="relative">
                <Mail className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                <input type="email" placeholder="อีเมล (E-mail)" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border-2 border-transparent focus:border-teal-400 rounded-2xl p-4 pl-12 text-gray-800 font-bold outline-none transition" />
              </div>

              <div className="relative">
                <Key className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                <input type="password" placeholder="รหัสผ่าน (Password)" required minLength="6" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border-2 border-transparent focus:border-teal-400 rounded-2xl p-4 pl-12 text-gray-800 font-bold outline-none transition" />
              </div>

              {!isLogin && (
                <label className="flex items-center justify-center gap-2 text-sm text-gray-400 font-bold cursor-pointer pt-2">
                  <input type="checkbox" checked={isAdminLogin} onChange={(e) => setIsAdminLogin(e.target.checked)} className="w-4 h-4 rounded text-teal-500" />
                  สมัครในฐานะผู้ดูแลระบบ (Admin)
                </label>
              )}

              {!isLogin && isAdminLogin && (
                <div className="relative animate-fade-in pb-2">
                  <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-red-400" size={20} />
                  <input type="password" placeholder="รหัสลับแอดมิน" required value={adminPin} onChange={e=>setAdminPin(e.target.value)} className="w-full bg-red-50 border-2 border-red-200 focus:border-red-500 rounded-2xl p-4 pl-12 text-red-800 font-black outline-none tracking-widest" />
                </div>
              )}
              
              <button type="submit" disabled={loading} className="w-full bg-gradient-to-r from-teal-400 to-emerald-500 text-white rounded-2xl py-4 text-lg font-black shadow-[0_10px_30px_rgba(16,185,129,0.4)] mt-2 hover:scale-[1.02] disabled:opacity-50 active:scale-95 transition-all">
                {loading ? 'กำลังตรวจสอบ...' : (isLogin ? 'เข้าสู่ระบบ 🚀' : 'เริ่มใช้งานฟรี ✨')}
              </button>
            </form>
          </div>
        </div>
      );
    }

          <p className="text-gray-500 font-bold text-sm bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-sm leading-relaxed">
            💡 กด <Eye size={14} className="inline text-blue-500"/> ดูข้อมูลและจัดการประวัติสุขภาพ/แจ้งเตือน<br/>

    function UserHealthModal({ user, onClose, db, appId, showToast, setConfirmDialog }) {
      const [stats, setStats] = useState({ water: 0, steps: 0 });
      const [logs, setLogs] = useState([]);
      const [healthLogs, setHealthLogs] = useState([]);
      const [reminders, setReminders] = useState([]);
      const [activeTab, setActiveTab] = useState('health'); 
      const todayStr = getTodayStr();

      // Form for New Reminder (แบบละเอียด)
      const [reminderForm, setReminderForm] = useState({ 
        type: 'medication', 
        title: '', 
        frequency: 'daily', // 'daily', 'specific'
        mealTiming: 'after', // 'before', 'after', 'none'
        timePeriods: { morning: false, lunch: false, evening: false, bedtime: false },
        date: '', 
        time: '', 
        note: '' 
      });
      const [hForm, setHForm] = useState({ weight: '', bp: '', sugar: '', note: '' });

      useEffect(() => {
        const statsRef = doc(db, 'artifacts', appId, 'public', 'data', `stats_${user.uid}`, todayStr);
        const unsubStats = onSnapshot(statsRef, (docSnap) => { if (docSnap.exists()) setStats(docSnap.data()); }, (error)=>{});

        const logsRef = collection(db, 'artifacts', appId, 'public', 'data', `logs_${user.uid}`);
        const unsubLogs = onSnapshot(logsRef, (snapshot) => {
          const allLogs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
          setLogs(allLogs.filter(l => l.date === todayStr).sort((a,b) => b.timestamp - a.timestamp));
        }, (error)=>{});

        const hLogsRef = collection(db, 'artifacts', appId, 'public', 'data', `health_${user.uid}`);
        const unsubHLogs = onSnapshot(hLogsRef, (snapshot) => {
          setHealthLogs(snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp));
        }, (error)=>{});

        const remRef = collection(db, 'artifacts', appId, 'public', 'data', `reminders_${user.uid}`);
        const unsubRem = onSnapshot(remRef, (snapshot) => {
          setReminders(snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp));
        }, (error)=>{});

        return () => { unsubStats(); unsubLogs(); unsubHLogs(); unsubRem(); };
      }, [user.uid, db, appId, todayStr]);

      const handleAddReminder = async () => {
        if (!reminderForm.title) return showToast('กรุณากรอกชื่อการแจ้งเตือน', 'error');
        if (reminderForm.type === 'appointment' && !reminderForm.date) return showToast('กรุณากรอกวันที่นัดหมาย', 'error');
        if (reminderForm.type === 'medication' && reminderForm.frequency === 'specific' && !reminderForm.date) return showToast('กรุณาระบุวันที่ทานยา', 'error');
        
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `reminders_${user.uid}`), {
          ...reminderForm,
          timestamp: Date.now()
        });
        showToast('เพิ่มการแจ้งเตือนสำเร็จ');
        setReminderForm({ 
          type: 'medication', title: '', frequency: 'daily', mealTiming: 'after', 
          timePeriods: { morning: false, lunch: false, evening: false, bedtime: false }, 
          date: '', time: '', note: '' 
        });
      };

      const handleDeleteReminder = (id) => {
        setConfirmDialog({ text: 'ลบการแจ้งเตือนนี้ใช่หรือไม่?', onConfirm: async () => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `reminders_${user.uid}`, id));
            showToast('ลบเรียบร้อย');
        }});
      };

      const handleAdminSaveHealth = async () => {
        if (!hForm.weight && !hForm.bp && !hForm.sugar) return showToast('กรุณากรอกข้อมูลอย่างน้อย 1 ช่อง', 'error');
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `health_${user.uid}`), {
          ...hForm, date: todayStr, timestamp: Date.now()
        });
        setHForm({ weight: '', bp: '', sugar: '', note: '' });
        showToast('แอดมินบันทึกข้อมูลสุขภาพให้ผู้ใช้สำเร็จ! ❤️');
      };

      return (
        <div className="fixed inset-0 z-[2000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 animate-fade-in">
          <div className="bg-white rounded-[2rem] w-full max-h-[85vh] flex flex-col shadow-2xl border-[4px] border-white/20 overflow-hidden">
            <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 flex-shrink-0">
              <h3 className="text-lg font-black text-gray-800 flex items-center gap-2"><Activity size={18} className="text-blue-500"/> ข้อมูล: {user.name}</h3>
              <button onClick={onClose} className="p-2 bg-gray-200 rounded-full text-gray-500 hover:bg-gray-300 transition"><X size={16}/></button>
            </div>
            
            <div className="flex bg-white border-b border-gray-100 flex-shrink-0">
               <button onClick={()=>setActiveTab('health')} className={`flex-1 py-3 text-sm font-black ${activeTab==='health'?'text-emerald-600 border-b-2 border-emerald-600':'text-gray-400'}`}>บันทึกสุขภาพ</button>
               <button onClick={()=>setActiveTab('daily')} className={`flex-1 py-3 text-sm font-black ${activeTab==='daily'?'text-blue-600 border-b-2 border-blue-600':'text-gray-400'}`}>ประจำวัน</button>
               <button onClick={()=>setActiveTab('reminders')} className={`flex-1 py-3 text-sm font-black ${activeTab==='reminders'?'text-rose-600 border-b-2 border-rose-600':'text-gray-400'}`}>นัด/ยา</button>
            </div>

            <div className="p-5 overflow-y-auto flex-1 hide-scrollbar bg-gray-50/50">
              {activeTab === 'daily' && (
                <div className="animate-fade-in space-y-6">
                  <div>
                    <h4 className="font-bold text-gray-800 mb-3 flex items-center gap-2">สถิติวันนี้ ({todayStr})</h4>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white p-4 rounded-[1.5rem] border border-gray-100 shadow-sm text-center">
                        <Droplet size={24} className="text-[#34A0A4] mx-auto mb-2"/>
                        <p className="text-[10px] font-black text-gray-400 uppercase">ดื่มน้ำ (แก้ว)</p>
                        <p className="font-black text-2xl text-[#34A0A4]">{stats.water}<span className="text-sm">/8</span></p>
                      </div>
                      <div className="bg-white p-4 rounded-[1.5rem] border border-gray-100 shadow-sm text-center">
                        <Footprints size={24} className="text-rose-500 mx-auto mb-2"/>
                        <p className="text-[10px] font-black text-gray-400 uppercase">ก้าวเดิน</p>
                        <p className="font-black text-2xl text-rose-500">{stats.steps}</p>
                      </div>
                    </div>
                  </div>
                  <div>
                    <h4 className="font-bold text-gray-800 mb-3">บันทึกอาหารวันนี้</h4>
                    <div className="space-y-3">
                      {logs.map(log => (
                        <div key={log.id} className="bg-white border border-gray-100 rounded-[1.5rem] p-3 flex gap-3 shadow-sm items-center">
                          <div className="w-12 h-12 bg-gray-50 rounded-xl overflow-hidden flex-shrink-0 border">
                            {log.image ? <img src={log.image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-xl">🍽️</div>}
                          </div>
                          <div className="flex-1">
                            <h5 className="font-extrabold text-gray-800 text-sm leading-tight">{log.name}</h5>
                            {log.ai_data && <p className="text-[10px] font-black text-orange-500 mt-1 bg-orange-50 inline-block px-2 py-0.5 rounded-md border border-orange-100">🔥 {log.ai_data.calories} kcal</p>}
                          </div>
                        </div>
                      ))}
                      {logs.length === 0 && <p className="text-center text-xs font-bold text-gray-400 py-4">ยังไม่มีการบันทึกอาหาร</p>}
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'health' && (
                <div className="animate-fade-in space-y-4">
                  <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-emerald-100">
                    <h4 className="font-bold text-emerald-600 mb-3 text-sm flex items-center gap-1"><Plus size={16}/> เพิ่มประวัติให้ผู้ใช้</h4>
                    <div className="grid grid-cols-3 gap-2 mb-2">
                      <input type="number" step="0.1" placeholder="น้ำหนัก" value={hForm.weight} onChange={e=>setHForm({...hForm, weight: e.target.value})} className="p-2 rounded-xl bg-gray-50 border border-gray-200 outline-none text-xs text-center font-bold" />
                      <input type="text" placeholder="ความดัน" value={hForm.bp} onChange={e=>setHForm({...hForm, bp: e.target.value})} className="p-2 rounded-xl bg-gray-50 border border-gray-200 outline-none text-xs text-center font-bold" />
                      <input type="number" placeholder="น้ำตาล" value={hForm.sugar} onChange={e=>setHForm({...hForm, sugar: e.target.value})} className="p-2 rounded-xl bg-gray-50 border border-gray-200 outline-none text-xs text-center font-bold" />
                    </div>
                    <input type="text" placeholder="หมายเหตุเพิ่มเติม" value={hForm.note} onChange={e=>setHForm({...hForm, note: e.target.value})} className="w-full p-2 mb-3 rounded-xl bg-gray-50 border border-gray-200 outline-none text-xs font-bold" />
                    <button onClick={handleAdminSaveHealth} className="w-full bg-emerald-500 text-white font-black py-2.5 rounded-xl shadow-md text-sm active:scale-95 transition">บันทึกประวัติสุขภาพ</button>
                  </div>

                  <div>
                    <h4 className="font-bold text-gray-800 mb-2 flex items-center gap-2"><HeartPulse size={16} className="text-emerald-500"/> ประวัติย้อนหลัง</h4>
                    <div className="space-y-3">
                      {healthLogs.length === 0 ? <p className="text-center text-xs font-bold text-gray-400 py-6 bg-white rounded-2xl border border-dashed">ผู้ใช้ยังไม่มีประวัติ</p> : 
                        healthLogs.map(log => (
                          <div key={log.id} className="bg-white p-4 rounded-[1.2rem] shadow-sm border border-gray-100 space-y-2 relative">
                            <p className="text-xs font-black text-emerald-600 bg-emerald-50 inline-block px-2 py-1 rounded-md mb-1"><Calendar size={12} className="inline mr-1"/>{log.date}</p>
                            <div className="flex justify-between items-center bg-gray-50 p-2 rounded-xl">
                              <div className="text-center flex-1 border-r border-gray-200 last:border-0"><p className="text-[9px] text-gray-400 font-bold">น้ำหนัก</p><p className="font-black text-gray-800">{log.weight||'-'}</p></div>
                              <div className="text-center flex-1 border-r border-gray-200 last:border-0"><p className="text-[9px] text-gray-400 font-bold">ความดัน</p><p className="font-black text-gray-800">{log.bp||'-'}</p></div>
                              <div className="text-center flex-1"><p className="text-[9px] text-gray-400 font-bold">น้ำตาล</p><p className="font-black text-gray-800">{log.sugar||'-'}</p></div>
                            </div>
                            {log.note && <p className="text-[10px] text-gray-600 bg-yellow-50 p-2 rounded-lg mt-1">📝 {log.note}</p>}
                          </div>
                        ))
                      }
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'reminders' && (
                <div className="animate-fade-in space-y-5 pb-6">
                  <div className="bg-white p-4 rounded-2xl shadow-sm border-2 border-rose-100">
                    <h4 className="font-bold text-gray-800 mb-3 text-sm">เพิ่มรายการแจ้งเตือนให้ผู้ใช้</h4>
                    <div className="space-y-3">
                      <select value={reminderForm.type} onChange={e=>setReminderForm({...reminderForm, type: e.target.value})} className="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 font-bold outline-none text-sm text-gray-700">
                        <option value="medication">💊 เตือนทานยา</option>
                        <option value="appointment">🏥 นัดหมอ/คลินิก</option>
                      </select>
                      <input type="text" placeholder={reminderForm.type === 'medication' ? "ชื่อยา" : "ชื่อนัดหมาย"} value={reminderForm.title} onChange={e=>setReminderForm({...reminderForm, title: e.target.value})} className="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 font-bold outline-none text-sm" />
                      
                      {reminderForm.type === 'medication' ? (
                         <div className="space-y-3 border border-orange-100 bg-orange-50/50 p-3 rounded-xl">
                            <div className="flex gap-2">
                               <select value={reminderForm.frequency} onChange={e=>setReminderForm({...reminderForm, frequency: e.target.value})} className="flex-1 p-2 rounded-lg bg-white border border-gray-200 font-bold outline-none text-xs text-gray-700">
                                 <option value="daily">📅 ทานทุกวัน</option>
                                 <option value="specific">🗓️ ระบุวันที่</option>
                               </select>
                               <select value={reminderForm.mealTiming} onChange={e=>setReminderForm({...reminderForm, mealTiming: e.target.value})} className="flex-1 p-2 rounded-lg bg-white border border-gray-200 font-bold outline-none text-xs text-gray-700">
                                 <option value="before">🍽️ ก่อนอาหาร</option>
                                 <option value="after">🍽️ หลังอาหาร</option>
                                 <option value="none">➖ ไม่ระบุ</option>
                               </select>
                            </div>
                            {reminderForm.frequency === 'specific' && (
                               <input type="date" value={reminderForm.date} onChange={e=>setReminderForm({...reminderForm, date: e.target.value})} className="w-full p-2 rounded-lg bg-white border border-gray-200 font-bold outline-none text-xs" />
                            )}
                            <div className="pt-1">
                               <p className="text-[10px] font-bold text-gray-500 mb-1">ช่วงเวลาที่ต้องทาน:</p>
                               <div className="flex flex-wrap gap-2">
                                  {['morning', 'lunch', 'evening', 'bedtime'].map(t => {
                                     const labels = {morning:'เช้า', lunch:'กลางวัน', evening:'เย็น', bedtime:'ก่อนนอน'};

                                      {rem.timePeriods?.lunch && <span className="text-[9px] bg-orange-100 text-orange-700 px-2 py-0.5 rounded-md font-bold flex items-center gap-0.5"><SunMedium size={10}/> กลางวัน</span>}

                                      {rem.timePeriods?.bedtime && <span className="text-[9px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded-md font-bold flex items-center gap-0.5"><MoonStar size={10}/> ก่อนนอน</span>}

    function UserApp({ profile, missions, rewards, leaderboard, userProgress, onLogout, onUpdateProfile, db, appId, setConfirmDialog, showToast }) {
      const [activeTab, setActiveTab] = useState('home'); // home, health, leaderboard, missions, log, profile
      const [showRewardsModal, setShowRewardsModal] = useState(false);
      const [successModal, setSuccessModal] = useState(null);

      const completeMission = async (mission, base64Image) => {
        const todayStr = getTodayStr();
        const currentWeekStr = getWeekStr();
        const completedToday = userProgress.filter(p => p.missionId === mission.id && p.date === todayStr).length;
        const maxAllowed = mission.maxPerDay || 1;

        if (completedToday >= maxAllowed) {
          return showToast(`ภารกิจนี้ทำครบโควต้าของวันนี้แล้ว (${maxAllowed}/${maxAllowed} ครั้ง)`, 'error');
        }
        
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `progress_${profile.uid}`), {
          missionId: mission.id, date: todayStr, timestamp: Date.now(), image: base64Image 
        });

        const userWeek = profile.currentWeek || '';
        const baseWeekly = (userWeek === currentWeekStr) ? (profile.weeklyPoints || 0) : 0;
        
        const newWeeklyPoints = baseWeekly + mission.points;
        const newTotalPoints = (profile.points || 0) + mission.points; 

        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', profile.uid), { 
          points: newTotalPoints,
          weeklyPoints: newWeeklyPoints,
          currentWeek: currentWeekStr
        });
        
        showToast(`เยี่ยมมาก! ยืนยันภาพสำเร็จ ได้รับ ${mission.points} แต้ม 🎉`);
      };

      const redeemReward = (reward) => {
        if ((profile.points || 0) < reward.points) return showToast('คะแนนไม่พอนะ ลุยทำภารกิจเพิ่มเลย! 🏃‍♂️', 'error');
        setConfirmDialog({
          text: `ยืนยันแลก "${reward.title}" ด้วย ${reward.points} แต้ม?`,
          onConfirm: async () => {
            const newPoints = profile.points - reward.points;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', profile.uid), { points: newPoints });
            setSuccessModal(reward);
            setShowRewardsModal(false);
          }
        });
      };

      return (
        <div className="h-full flex flex-col bg-[#F4F7F6]">
          <main className="flex-1 overflow-y-auto pb-24 hide-scrollbar">
            {!showRewardsModal && activeTab === 'home' && <HomeTab profile={profile} db={db} appId={appId} onLogMeal={() => setActiveTab('log')} showToast={showToast} />}
            {!showRewardsModal && activeTab === 'health' && <HealthTab profile={profile} db={db} appId={appId} showToast={showToast} />}
            {!showRewardsModal && activeTab === 'leaderboard' && <UserLeaderboardTab leaderboard={leaderboard} currentUserId={profile.uid} />}
            {!showRewardsModal && activeTab === 'missions' && <UserMissionsTab missions={missions} userProgress={userProgress} onComplete={completeMission} />}
            {!showRewardsModal && activeTab === 'log' && <FoodLogTab profile={profile} db={db} appId={appId} showToast={showToast} />}
            {!showRewardsModal && activeTab === 'profile' && <ProfileTab profile={profile} onLogout={onLogout} onOpenRewards={() => setShowRewardsModal(true)} onUpdateProfile={onUpdateProfile} showToast={showToast} leaderboard={leaderboard} db={db} appId={appId} />}
            
            {showRewardsModal && <RewardsModal onClose={() => setShowRewardsModal(false)} points={profile.points} rewards={rewards} onRedeem={redeemReward} />}
          </main>

          {successModal && (
            <div className="absolute inset-0 z-[100] bg-black/80 flex items-center justify-center p-6 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[3rem] p-8 text-center w-full border-[6px] border-white shadow-[0_0_50px_rgba(0,0,0,0.3)] relative overflow-hidden">
                 <div className="absolute top-[-20%] left-[-20%] w-48 h-48 bg-teal-300 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
                 <div className="text-7xl mb-4 relative z-10 animate-bounce drop-shadow-md">🎉</div>
                 <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-500 to-emerald-500 mb-2 relative z-10 tracking-tight">ยินดีด้วย!</h2>
                 <p className="text-gray-800 font-black text-lg mb-2 relative z-10">คุณได้ทำการแลกรางวัล:</p>
                 <p className="text-2xl font-black text-gray-900 mb-6 bg-white/80 py-4 rounded-2xl border border-gray-100 relative z-10 shadow-sm">{successModal.image} {successModal.title}</p>
                 
                 <div className="bg-gradient-to-br from-teal-50 to-emerald-50 p-6 rounded-[2rem] border border-teal-200 mb-6 relative z-10 shadow-inner">
                    <div className="flex justify-center mb-3"><Smartphone className="text-teal-500" size={40}/></div>
                    <p className="text-teal-800 font-black text-lg leading-tight">📸 กรุณาแคปหน้าจอนี้</p>
                    <div className="mt-4 bg-[#06C755] py-4 rounded-[1.2rem] shadow-[0_5px_15px_rgba(6,199,85,0.4)] flex justify-center items-center hover:scale-105 transition cursor-pointer">
                       <span className="text-white font-black text-lg tracking-wide">ส่งหลักฐานให้แอดมิน</span>
                    </div>
                 </div>
                 
                 <button onClick={() => setSuccessModal(null)} className="w-full bg-gray-900 text-white font-black py-4 rounded-2xl hover:bg-gray-800 active:scale-95 transition relative z-10 shadow-md text-lg">
                   รับทราบ ปิดหน้าต่าง
                 </button>
              </div>
            </div>
          )}

          {!showRewardsModal && (
            <nav className="absolute bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-gray-100 flex justify-between items-center py-2 px-3 z-20 pb-safe shadow-[0_-15px_40px_rgba(0,0,0,0.05)]">
              <NavItem icon={<Home size={20} />} label="หน้าแรก" active={activeTab === 'home'} onClick={() => setActiveTab('home')} color="text-teal-500" />
              <NavItem icon={<Activity size={20} />} label="สุขภาพ" active={activeTab === 'health'} onClick={() => setActiveTab('health')} color="text-rose-500" />
              <NavItem icon={<Target size={20} />} label="ภารกิจ" active={activeTab === 'missions'} onClick={() => setActiveTab('missions')} color="text-indigo-500" />
              <NavItem icon={<Trophy size={20} />} label="อันดับ" active={activeTab === 'leaderboard'} onClick={() => setActiveTab('leaderboard')} color="text-yellow-500" />
              <NavItem icon={<Camera size={20} />} label="อาหาร" active={activeTab === 'log'} onClick={() => setActiveTab('log')} color="text-orange-500" />
              <NavItem icon={<User size={20} />} label="โปรไฟล์" active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} color="text-emerald-500" />
            </nav>
          )}
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick, color }) {
      return (
        <button onClick={onClick} className={`flex flex-col items-center gap-1 p-2 transition-all duration-300 ${active ? color : 'text-gray-400 hover:text-gray-600'}`}>
          <div className={`transition-transform duration-300 ${active ? 'scale-110 drop-shadow-md' : 'scale-100'}`}>{React.cloneElement(icon, { strokeWidth: active ? 3 : 2 })}</div>
          <span className={`text-[9px] ${active ? 'font-black' : 'font-bold'}`}>{label}</span>
        </button>

    }

    // --- Tab: Home (Added Reminders to Top) ---
    function HomeTab({ profile, db, appId, onLogMeal, showToast }) {
      const [stats, setStats] = useState({ water: 0, steps: 0 });
      const [stepInput, setStepInput] = useState('');
      const [reminders, setReminders] = useState([]);
      const todayStr = getTodayStr();
      const currentWeekStr = getWeekStr();

      useEffect(() => {
        const statsRef = doc(db, 'artifacts', appId, 'public', 'data', `stats_${profile.uid}`, todayStr);
        const unsub = onSnapshot(statsRef, (docSnap) => {
          if (docSnap.exists()) setStats(docSnap.data());
          else setDoc(statsRef, { water: 0, steps: 0 }); 
        }, (error)=>{});
        return () => unsub();
      }, [profile.uid, db, appId, todayStr]);

      useEffect(() => {
        const remRef = collection(db, 'artifacts', appId, 'public', 'data', `reminders_${profile.uid}`);
        const unsubRem = onSnapshot(remRef, (snapshot) => {
          setReminders(snapshot.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp));
        }, (error)=>{});
        return () => unsubRem();
      }, [profile.uid, db, appId]);

      const updateWater = async () => {
        if (stats.water >= 8) return showToast('ยอดเยี่ยม! ดื่มน้ำครบแล้ว 💧', 'success');
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', `stats_${profile.uid}`, todayStr), { water: stats.water + 1 });

    // --- Tab: Health Log ---

    // --- Tab: Missions ---
    function UserMissionsTab({ missions, userProgress, onComplete }) {
      const fileInputRef = useRef(null);
      const [selectedMission, setSelectedMission] = useState(null);
      const [verifying, setVerifying] = useState(false);
      const todayStr = getTodayStr();

      const validMissions = missions.filter(m => {
        if (m.expiresAt && m.expiresAt < todayStr) return false;
        return true;
      });

      const handleUploadClick = (mission) => {
        setSelectedMission(mission);
        fileInputRef.current.click();
      };

      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file || !selectedMission) return;
        setVerifying(true);
        try {
          const base64 = await resizeImage(file);
          setTimeout(async () => {
            await onComplete(selectedMission, base64);
            setVerifying(false); setSelectedMission(null);
          }, 2000); 
        } catch(err) {
          setVerifying(false);
        }
      };

      return (
        <div className="p-6 pt-12 animate-fade-in space-y-6">
          <h1 className="text-3xl font-black text-gray-800 tracking-tight">ภารกิจสุขภาพ 🎯</h1>
          <input type="file" accept="image/*" capture="environment" className="hidden" ref={fileInputRef} onChange={handleFileChange} />

          {verifying && (
            <div className="fixed inset-0 bg-white/95 z-50 flex flex-col items-center justify-center backdrop-blur-md">
              <div className="w-28 h-28 bg-gradient-to-tr from-teal-400 to-emerald-400 rounded-[2.5rem] flex items-center justify-center animate-bounce mb-6 shadow-xl border-4 border-white"><Camera className="text-white" size={56}/></div>
              <h2 className="text-3xl font-black text-gray-800 text-center tracking-tight">AI กำลังตรวจภาพ...</h2>
              <p className="text-teal-600 font-bold mt-2 text-lg">โปรดรอสักครู่เพื่อให้คะแนนคุณ</p>
            </div>
          )}

          <div className="space-y-4">
            {validMissions.map(mission => {
              const completedCount = userProgress.filter(p => p.missionId === mission.id && p.date === todayStr).length;
              const maxAllowed = mission.maxPerDay || 1;
              const isFullyCompleted = completedCount >= maxAllowed;

              return (
                <div key={mission.id} className={`bg-white rounded-[2rem] p-5 shadow-sm border-2 transition-all duration-500 ${isFullyCompleted ? 'border-teal-100 bg-teal-50/40' : 'border-transparent hover:shadow-md'}`}>
                  <div className="flex gap-4">
                    <div className="w-16 h-16 rounded-[1.5rem] flex items-center justify-center text-3xl flex-shrink-0 shadow-inner border border-white bg-indigo-50 text-indigo-500">🎯</div>
                    <div className="flex-1 pt-1 pr-2">
                      <h3 className={`font-extrabold text-lg leading-tight ${isFullyCompleted ? 'text-gray-400 line-through' : 'text-gray-800'}`}>{mission.title}</h3>
                      <p className="text-sm text-gray-500 mt-1 line-clamp-2 font-bold">{mission.subtitle}</p>
                    </div>
                  </div>

                  <div className="mt-5 flex justify-between items-center border-t border-gray-50 pt-4">
                    <div className="flex items-center gap-1 bg-gradient-to-r from-teal-50 to-emerald-50 text-teal-600 px-3 py-1.5 rounded-xl font-black text-sm border border-teal-100 shadow-sm">
                      🪙 +{mission.points} Pts <span className="text-[10px] text-gray-400 bg-white px-2 py-0.5 rounded-md ml-1 border">ทำแล้ว {completedCount}/{maxAllowed}</span>
                    </div>
                    
                    {isFullyCompleted ? (
                      <span className="font-extrabold text-emerald-500 flex items-center gap-1.5 bg-white px-4 py-2 rounded-xl text-sm shadow-sm border border-emerald-100">
                        <CheckCircle size={16} strokeWidth={3} /> สำเร็จแล้ว
                      </span>
                    ) : (
                      <button onClick={() => handleUploadClick(mission)} className="bg-gradient-to-r from-teal-400 to-emerald-500 text-white px-5 py-2.5 rounded-xl font-black text-sm shadow-[0_5px_15px_rgba(20,184,166,0.3)] flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all">
                        <Camera size={18} /> ยืนยันภาพ
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
            {validMissions.length === 0 && <p className="text-center text-gray-400 font-bold p-10 bg-white rounded-3xl border border-dashed border-gray-200">ยังไม่มีภารกิจ</p>}
          </div>
        </div>
      );
    }

    function FoodLogTab({ profile, db, appId, showToast }) {
      const [activeMeal, setActiveMeal] = useState('lunch');
      const [foodName, setFoodName] = useState('');
      const [note, setNote] = useState('');
      const [image, setImage] = useState(null);
      const [logs, setLogs] = useState([]);
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [aiAnalysis, setAiAnalysis] = useState(null);
      
      const fileRef = useRef(null);
      const todayStr = getTodayStr();

      useEffect(() => {
        const logsRef = collection(db, 'artifacts', appId, 'public', 'data', `logs_${profile.uid}`);
        const unsub = onSnapshot(logsRef, (snapshot) => {
          const allLogs = snapshot.docs.map(d => ({id: d.id, ...d.data()}));
          setLogs(allLogs.filter(l => l.date === todayStr).sort((a,b) => b.timestamp - a.timestamp));
        }, (error)=>{});
        return () => unsub();
      }, [profile.uid, db, appId, todayStr]);

      const handlePhoto = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsAnalyzing(true); setAiAnalysis(null); setFoodName('');
        
        try {
          const base64 = await resizeImage(file);
          setImage(base64);
          const analysis = await analyzeFoodWithAI(base64);
          setAiAnalysis(analysis);
          setFoodName(analysis.name !== 'ไม่พบอาหาร' ? analysis.name : '');
        } catch (err) {
          setFoodName('');
          showToast("ไม่สามารถใช้ AI วิเคราะห์ได้ (โปรดกรอกข้อมูลด้วยตนเอง)", "error");
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleSaveMeal = async () => {
        if (!foodName.trim() && !image) return showToast('กรุณาระบุชื่ออาหารหรือถ่ายรูป', 'error');
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `logs_${profile.uid}`), {
          meal: activeMeal, name: foodName || 'เมนูระบุไม่ได้', note: note,
          image: image, ai_data: aiAnalysis || null, date: todayStr, timestamp: Date.now()
        });
        setFoodName(''); setNote(''); setImage(null); setAiAnalysis(null);
        showToast('บันทึกมื้ออาหารสำเร็จ! 🥗');
      };

      const tabs = [{ id: 'morning', label: 'เช้า', icon: '☀️', color:'text-yellow-500' }, { id: 'lunch', label: 'กลางวัน', icon: '🍴', color:'text-orange-500' }, { id: 'dinner', label: 'เย็น', icon: '🌙', color:'text-indigo-500' }, { id: 'snack', label: 'ว่าง', icon: '🍎', color:'text-red-500' }];

      return (
        <div className="space-y-6 pb-6">
          <div className="pt-12 pb-4 px-6 border-b border-gray-100 sticky top-0 bg-white/95 backdrop-blur-md z-10 flex items-center gap-3 shadow-sm">
            <h1 className="text-xl font-black text-gray-800 leading-tight flex-1 text-center tracking-tight">บันทึกอาหาร</h1>
          </div>

          <div className="flex border-b border-gray-100 bg-white sticky top-[68px] z-10 shadow-sm px-2">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveMeal(tab.id)} className={`flex-1 py-4 flex flex-col items-center gap-2 relative ${activeMeal === tab.id ? tab.color : 'text-gray-400 hover:text-gray-600'}`}>

                  <div className="bg-white p-3 rounded-2xl text-center shadow-sm border border-orange-50">
                     <p className="text-[10px] text-gray-400 font-black uppercase tracking-wider mb-1">แคลอรี่</p>
                     <p className="font-black text-orange-500 text-2xl">{aiAnalysis.calories}</p>

                  <div className="bg-white p-3 rounded-2xl text-center shadow-sm border border-orange-50">
                     <p className="text-[10px] text-gray-400 font-black uppercase tracking-wider mb-1">ความหวาน</p>
                     <p className={`font-black text-xl ${aiAnalysis.sugar === 'สูง' ? 'text-red-500' : 'text-emerald-500'}`}>{aiAnalysis.sugar}</p>
                  </div>
                  <div className="bg-white p-3 rounded-2xl text-center shadow-sm border border-orange-50">
                     <p className="text-[10px] text-gray-400 font-black uppercase tracking-wider mb-1">ความเค็ม</p>
                     <p className={`font-black text-xl ${aiAnalysis.sodium === 'สูง' ? 'text-red-500' : 'text-emerald-500'}`}>{aiAnalysis.sodium}</p>
                  </div>

                <div className="bg-white/90 p-4 rounded-2xl shadow-inner border border-white relative z-10 text-center">
                  <p className="text-sm font-bold text-gray-700 leading-relaxed">"{aiAnalysis.advice}"</p>

              </div>

            <div className="bg-white p-6 rounded-[2.5rem] shadow-sm space-y-4 border border-gray-50">

              <button onClick={handleSaveMeal} className="w-full bg-gradient-to-r from-orange-400 to-rose-500 text-white font-black py-5 rounded-2xl text-xl shadow-[0_10px_25px_rgba(249,115,22,0.3)] hover:scale-[1.02] active:scale-95 transition-all tracking-wide">บันทึกมื้อนี้เข้าสู่ระบบ</button>

                        <span className="text-[10px] font-black text-orange-500 bg-orange-50 px-3 py-1 rounded-full uppercase inline-block mb-1 border border-orange-100 shadow-sm">{tabs.find(t=>t.id === log.meal)?.label}</span>

    // --- Tab: Profile (Weekly Summary & Email Edit) ---
    function ProfileTab({ profile, onLogout, onOpenRewards, onUpdateProfile, showToast, leaderboard, db, appId, onShowLeaderboard }) {
      const [isEditing, setIsEditing] = useState(false);
      const [editName, setEditName] = useState(profile.name);
      const [editAvatar, setEditAvatar] = useState(profile.avatar);
      
      const [editEmail, setEditEmail] = useState('');
      const [editPassword, setEditPassword] = useState('');
      const [currentAuthId, setCurrentAuthId] = useState('');
      const fileRef = useRef(null);

      const [weeklyStats, setWeeklyStats] = useState({ steps: 0, water: 0, calories: 0, sugarAlerts: 0, sodiumAlerts: 0 });

      const userRank = leaderboard?.find(u => u.uid === profile.uid)?.rank || '-';

      useEffect(() => {
        if (isEditing) {
          const fetchAuthData = async () => {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'auth'), where('uid', '==', profile.uid));
            const snap = await getDocs(q);
            if(!snap.empty) {
               const authData = snap.docs[0].data();
               setCurrentAuthId(snap.docs[0].id);
               setEditEmail(authData.email);
               setEditPassword(authData.password);
            }
          };
          fetchAuthData();
        }
      }, [isEditing, db, appId, profile.uid]);

      useEffect(() => {
        const past7 = getPast7Days();
        
        const unsubStats = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `stats_${profile.uid}`), snap => {
           let steps = 0, water = 0;
           snap.docs.forEach(d => {
              if(past7.includes(d.id)) {
                 steps += d.data().steps || 0;
                 water += d.data().water || 0;
              }
           });
           setWeeklyStats(prev => ({...prev, steps, water}));
        });
        
        const unsubLogs = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `logs_${profile.uid}`), snap => {
           let cals = 0, sug = 0, sod = 0;
           snap.docs.forEach(d => {
              const data = d.data();
              if(past7.includes(data.date)) {
                 if(data.ai_data) {
                    cals += data.ai_data.calories || 0;
                    if(data.ai_data.sugar === 'สูง') sug++;
                    if(data.ai_data.sodium === 'สูง') sod++;
                 }
              }
           });
           setWeeklyStats(prev => ({...prev, calories: cals, sugarAlerts: sug, sodiumAlerts: sod}));
        });

        return () => { unsubStats(); unsubLogs(); };
      }, [db, appId, profile.uid]);

      const handleAvatarChange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          const base64 = await resizeImage(file, 200); 
          setEditAvatar(base64);
        }
      };

      const handleSaveProfile = () => {
        if(!editName.trim()) return showToast("กรุณาใส่ชื่อ", 'error');
        if(!editEmail.trim() || !editPassword.trim()) return showToast("กรุณาใส่อีเมลและรหัสผ่าน", 'error');
        
        onUpdateProfile(editName, editAvatar, editEmail, editPassword, currentAuthId);
        setIsEditing(false);
      };

      return (
        <div className="p-6 pt-12 animate-fade-in bg-[#F4F5F7] min-h-screen">
          <div className="bg-white rounded-[2.5rem] p-8 shadow-sm mb-6 relative overflow-hidden border border-gray-50 flex flex-col items-center">
            <div className="absolute top-0 right-0 p-4 opacity-5 text-8xl">👑</div>
            <div className="w-32 h-32 rounded-full border-[5px] border-white shadow-xl overflow-hidden bg-gray-100 flex items-center justify-center text-6xl mb-5 relative z-10">
              {profile.avatar?.startsWith('http') || profile.avatar?.startsWith('data:') ? <img src={profile.avatar} className="w-full h-full object-cover" /> : profile.avatar}
            </div>
            <h2 className="text-3xl font-black text-gray-800 relative z-10 text-center tracking-tight">{profile.name}</h2>
            
            <div className="flex gap-2 mt-3 cursor-pointer hover:scale-105 transition" onClick={onShowLeaderboard}>
              <p className="text-emerald-500 font-black bg-emerald-50 border border-emerald-100 px-4 py-2 rounded-full text-sm shadow-sm flex items-center gap-1">
                <Star size={16} className="fill-emerald-500"/> Lv. {profile.level || 1}
              </p>
              <p className="text-teal-600 font-black bg-teal-50 border border-teal-100 px-4 py-2 rounded-full text-sm shadow-sm flex items-center gap-1">
                <Trophy size={16} className="text-teal-600"/> อันดับ {userRank}
              </p>
            </div>
            
            <button onClick={() => setIsEditing(true)} className="mt-6 bg-gray-900 text-white px-6 py-3.5 rounded-2xl font-black text-sm hover:bg-gray-800 transition-colors flex items-center gap-2 shadow-md active:scale-95">
              <Settings size={16}/> ตั้งค่าและแก้ไขโปรไฟล์
            </button>
          </div>

          {/* สรุปผลรายสัปดาห์ */}
          <div className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-50 relative overflow-hidden mb-6">
            <div className="absolute top-0 right-0 p-4 opacity-5 text-6xl">📊</div>
            <h3 className="font-extrabold text-gray-800 text-lg mb-4 relative z-10 flex items-center gap-2"><TrendingUp size={20} className="text-teal-500"/> สรุปผลสุขภาพ 7 วันล่าสุด</h3>
            
            <div className="flex justify-around relative z-10 bg-gray-50 p-4 rounded-[1.5rem] border border-gray-100 shadow-inner">
               <div className="flex flex-col items-center">
                  <span className="text-3xl mb-1 drop-shadow-sm">💧</span>
                  <span className="font-black text-cyan-600 text-xl mb-1 leading-none">{weeklyStats.water}</span>
                  <span className="text-[10px] text-gray-500 font-bold uppercase">ดื่มน้ำ (แก้ว)</span>
               </div>
               <div className="w-px bg-gray-200"></div>
               <div className="flex flex-col items-center">
                  <span className="text-3xl mb-1 drop-shadow-sm">👟</span>
                  <span className="font-black text-rose-500 text-xl mb-1 leading-none">{weeklyStats.steps.toLocaleString()}</span>
                  <span className="text-[10px] text-gray-500 font-bold uppercase">ก้าวเดิน (รวม)</span>
               </div>
               <div className="w-px bg-gray-200"></div>
               <div className="flex flex-col items-center">
                  <span className="text-3xl mb-1 drop-shadow-sm">🔥</span>
                  <span className="font-black text-orange-500 text-xl mb-1 leading-none">{weeklyStats.calories.toLocaleString()}</span>
                  <span className="text-[10px] text-gray-500 font-bold uppercase">แคลอรี่ที่กิน</span>
               </div>
            </div>

            <div className="bg-white p-4 rounded-xl border border-rose-100 shadow-sm mt-4 flex justify-between text-xs relative z-10">
               <span className="font-bold text-gray-700 flex items-center gap-1">⚠️ ทานหวานสูง: <span className={`font-black ${weeklyStats.sugarAlerts > 0 ? 'text-red-500' : 'text-emerald-500'}`}>{weeklyStats.sugarAlerts} มื้อ</span></span>
               <span className="font-bold text-gray-700 flex items-center gap-1">⚠️ ทานเค็มสูง: <span className={`font-black ${weeklyStats.sodiumAlerts > 0 ? 'text-red-500' : 'text-emerald-500'}`}>{weeklyStats.sodiumAlerts} มื้อ</span></span>
            </div>
            {(weeklyStats.sugarAlerts > 2 || weeklyStats.sodiumAlerts > 2) && (
              <p className="text-[10px] text-red-500 font-bold text-center mt-3 animate-pulse">สัปดาห์นี้ทานรสจัดบ่อยไปนิด ดื่มน้ำเยอะๆ นะครับ!</p>
            )}
          </div>

          {isEditing && (
            <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-6 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[3rem] p-8 w-full max-w-sm shadow-2xl relative border-[4px] border-white/20">
                <button onClick={() => setIsEditing(false)} className="absolute top-6 right-6 text-gray-400 hover:text-gray-800 bg-gray-100 p-2 rounded-full transition"><X size={20}/></button>
                <h3 className="text-3xl font-black text-gray-800 mb-6 text-center tracking-tight">ตั้งค่าบัญชี</h3>
                
                <div className="flex flex-col items-center mb-6">
                  <div className="w-24 h-24 rounded-full border-4 border-gray-100 overflow-hidden mb-2 relative group cursor-pointer shadow-inner bg-gray-50" onClick={() => fileRef.current.click()}>
                     {editAvatar?.startsWith('http') || editAvatar?.startsWith('data:') ? <img src={editAvatar} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-4xl">{editAvatar}</div>}
                     <div className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition"><Camera className="text-white mb-1" size={24}/><span className="text-[10px] text-white font-bold">เปลี่ยนรูป</span></div>
                  </div>
                  <input type="file" accept="image/*" className="hidden" ref={fileRef} onChange={handleAvatarChange} />
                </div>

                <div className="space-y-3 overflow-y-auto max-h-[40vh] p-1 hide-scrollbar">
                  <div className="bg-gray-50 p-2 rounded-2xl border-2 border-transparent focus-within:border-teal-400 transition-colors">
                    <p className="text-[10px] font-black text-gray-400 uppercase px-3 pt-1">ชื่อแสดงผล</p>
                    <input type="text" value={editName} onChange={e=>setEditName(e.target.value)} className="w-full bg-transparent px-3 py-1 text-gray-800 font-bold outline-none text-lg" />
                  </div>
                  <div className="bg-gray-50 p-2 rounded-2xl border-2 border-transparent focus-within:border-teal-400 transition-colors">
                    <p className="text-[10px] font-black text-gray-400 uppercase px-3 pt-1">อีเมล</p>
                    <input type="email" value={editEmail} onChange={e=>setEditEmail(e.target.value)} className="w-full bg-transparent px-3 py-1 text-gray-800 font-bold outline-none text-lg" />
                  </div>
                  <div className="bg-gray-50 p-2 rounded-2xl border-2 border-transparent focus-within:border-teal-400 transition-colors">
                    <p className="text-[10px] font-black text-gray-400 uppercase px-3 pt-1">รหัสผ่าน</p>
                    <input type="text" value={editPassword} onChange={e=>setEditPassword(e.target.value)} className="w-full bg-transparent px-3 py-1 text-gray-800 font-bold outline-none text-lg" />
                  </div>
                </div>
                <button onClick={handleSaveProfile} className="w-full bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-black py-4 rounded-2xl shadow-[0_10px_20px_rgba(20,184,166,0.3)] hover:scale-[1.02] active:scale-95 transition-all text-lg mt-6">บันทึกข้อมูล 💾</button>
              </div>
            </div>
          )}

          <div className="space-y-4">
            <button onClick={onOpenRewards} className="w-full bg-gradient-to-r from-teal-400 to-emerald-500 text-white rounded-[2rem] py-5 text-xl font-black shadow-[0_10px_25px_rgba(20,184,166,0.3)] flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all">
              <span className="text-2xl drop-shadow-md">🎁</span> ร้านค้าแลกของรางวัล
            </button>

            <button onClick={onLogout} className="w-full bg-white text-red-500 font-black border-[3px] border-red-50 rounded-[2rem] hover:bg-red-50 transition-colors py-4 flex justify-center items-center gap-2 shadow-sm">
               <LogOut size={20}/> ออกจากระบบ
            </button>
          </div>
        </div>
      );
    }

    // --- Tab: Leaderboard (New Tab instead of Modal) ---

            </div>

                    {user.avatar?.startsWith('http') || user.avatar?.startsWith('data:') ? <img src={user.avatar} className="w-full h-full object-cover"/> : user.avatar}
                  </div>
                  <div className="flex-1 min-w-0">
                    <h4 className="font-extrabold text-gray-800 text-lg truncate flex items-center gap-2">
                      {user.name} 
                      {user.uid === currentUserId && <span className="text-[10px] text-white bg-teal-500 px-2 py-0.5 rounded-full shadow-sm flex-shrink-0">คุณ</span>}
                    </h4>
                    <p className="font-black text-gray-500 text-base mt-1">{(user.weeklyPoints||0).toLocaleString()} <span className="text-[10px] font-black uppercase text-gray-400">Pts/Week</span></p>

                  <div className="w-12 text-center drop-shadow-lg text-4xl">

            <div className="bg-gradient-to-r from-teal-500 to-emerald-500 rounded-[2.5rem] p-5 flex items-center text-white shadow-[0_20px_40px_rgba(16,185,129,0.4)] pointer-events-auto border-[4px] border-white/20 backdrop-blur-md">
              <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-4xl mr-4 overflow-hidden border-[3px] border-teal-200 shadow-inner flex-shrink-0">
                 {leaderboard.find(u=>u.uid===currentUserId)?.avatar?.startsWith('http') || leaderboard.find(u=>u.uid===currentUserId)?.avatar?.startsWith('data:') ? <img src={leaderboard.find(u=>u.uid===currentUserId)?.avatar} className="w-full h-full object-cover"/> : leaderboard.find(u=>u.uid===currentUserId)?.avatar || '👦🏻'}
              </div>
              <div className="flex-1 flex justify-between items-center">
                <div>
                  <p className="text-[10px] text-teal-100 font-black uppercase tracking-widest mb-1">อันดับของคุณ</p>
                  <h3 className="text-3xl font-black leading-none drop-shadow-sm text-white"># {userRank}</h3>
                </div>
                <div className="text-right">
                  <p className="text-[10px] text-teal-100 font-black uppercase tracking-widest mb-1">แต้มสัปดาห์นี้</p>
                  <p className="font-black text-2xl text-yellow-300 drop-shadow-md">{(userPoints||0).toLocaleString()}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- Rewards Modal ---
    function RewardsModal({ onClose, points, rewards, onRedeem }) {
      return (
        <div className="absolute inset-0 bg-[#F4F5F7] z-50 flex flex-col animate-slide-up">
          <div className="pt-12 pb-4 px-6 bg-white/95 backdrop-blur-md border-b border-gray-100 flex items-center shadow-sm flex-shrink-0">
            <button onClick={onClose} className="p-3 -ml-2 text-gray-800 bg-gray-100 rounded-full hover:bg-gray-200 transition"><ChevronLeft size={24} /></button>
            <h1 className="text-xl font-black text-gray-800 flex-1 text-center pr-10">แลกของรางวัล</h1>
          </div>

          <div className="text-center py-8 bg-white border-b border-gray-100 mb-6 shadow-sm relative overflow-hidden flex-shrink-0">
            <div className="absolute top-0 right-0 p-4 opacity-5 text-8xl">🎁</div>
            <p className="text-gray-500 font-black uppercase tracking-wider mb-2 relative z-10">คะแนนสะสม (Wallet) ของคุณ</p>
            <div className="flex items-center justify-center gap-3 relative z-10">
              <div className="w-12 h-12 bg-gradient-to-br from-yellow-200 to-yellow-400 rounded-full flex items-center justify-center text-2xl shadow-md border-2 border-white">🪙</div>
              <h2 className="text-6xl font-black text-gray-900 tracking-tight drop-shadow-sm">{(points||0).toLocaleString()}</h2>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto px-6 pb-10 grid grid-cols-2 gap-4 place-content-start hide-scrollbar">
            {rewards.map(r => (
               <div key={r.id} className="bg-white border border-gray-100 rounded-[2rem] p-4 shadow-sm flex flex-col items-center text-center hover:shadow-md transition">
                 <div className={`w-full aspect-square bg-gradient-to-br from-teal-50 to-emerald-50 rounded-[1.5rem] flex items-center justify-center text-6xl mb-4 shadow-inner border border-white`}>{r.image}</div>
                 <h4 className="font-extrabold text-gray-800 text-sm mb-auto leading-tight">{r.title}</h4>
                 <button onClick={() => onRedeem(r)} className={`w-full mt-4 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-black py-3 rounded-xl text-xs shadow-md hover:opacity-90 active:scale-95 transition`}>
                   แลกเลย {r.points.toLocaleString()}
                 </button>
               </div>
            ))}
            {rewards.length === 0 && (
              <div className="col-span-2 text-center text-gray-400 font-bold py-10 bg-white rounded-3xl border border-dashed border-gray-200">ยังไม่มีของรางวัลในระบบ</div>
            )}
          </div>
        </div>
      );
    }

    function LoadingScreen() {
      return <div className="flex h-full w-full items-center justify-center bg-gray-900"><Activity className="text-teal-500 animate-pulse drop-shadow-[0_0_15px_rgba(20,184,166,0.8)]" size={80} strokeWidth={2} /></div>;
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
